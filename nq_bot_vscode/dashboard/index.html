  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ═══════════════════════════════════════════════════════════════
// NQ FORENSIC TRADE VISUALIZER — Institutional-Grade Chart System
// Canvas-based OHLCV + Trade Overlay + Session Logic + Analytics
// ═══════════════════════════════════════════════════════════════
// ── THEME ──────────────────────────────────────────────────────
const T = {
  bg: "#080b12", bgPanel: "#0c1018", bgCard: "#111620",
  bgHover: "#161d2a", bgActive: "#1a2332",
  border: "#1a2030", borderLight: "#232d40",
  grid: "#141c28", gridMajor: "#1a2435",
  text: "#8892a4", textMuted: "#556178", textBright: "#c8d0e0",
  textWhite: "#e8ecf4",
  green: "#00c087", greenDim: "#00c08730", greenBg: "#00c08712",
  red: "#e5334b", redDim: "#e5334b30", redBg: "#e5334b12",
  blue: "#3b82f6", blueDim: "#3b82f620",
  amber: "#f59e0b", amberDim: "#f59e0b20",
  purple: "#a855f7", purpleDim: "#a855f720",
  cyan: "#06b6d4",
  maintenanceShade: "#f59e0b08", maintenanceBorder: "#f59e0b15",
  crosshair: "#3b82f650",
  selection: "#3b82f620",
  vwap: "#e68a00", vwapDim: "#e68a0040",
  sma20: "#22d3ee", sma50: "#f472b6", sma200: "#fbbf24",
  atrBand: "#3b82f610",
  volProfile: "#3b82f618",
  regimeUp: "#00c087", regimeDown: "#e5334b", regimeRange: "#f59e0b", regimeUnk: "#556178",
  htfBull: "#00c087", htfBear: "#e5334b", htfNeutral: "#556178",
  gold: "#fbbf24",
};
// ── DATA LOADING ──────────────────────────────────────────────
// Handles both viz_data.json (data_adapter output) and raw backtest_viz_data.json
function toEpoch(t) { return typeof t === "string" ? new Date(t).getTime() : t; }
function mapExitType(e) {
  const r1 = (e.c1_exit_reason || "").toLowerCase();
  const r2 = (e.c2_exit_reason || "").toLowerCase();
  if (r2 === "trailing") return "trailing_stop";
  if (r1 === "target" && r2 === "trailing") return "trailing_stop";
  if (r1 === "target" && r2 === "target") return "pt2_target";
  if (r1 === "target") return "pt1_partial";
  if (r1 === "stop" || r2 === "stop") return "stop_loss";
  if (r2 === "breakeven" || r2 === "be_plus") return "be_plus";
  return "stop_loss";
}
function pairTradeEvents(events) {
  const trades = []; let entry = null;
  events.forEach(e => {
    if (e.action === "entry") { entry = e; }
    else if (e.action === "trade_closed" && entry) {
      const sd = Math.abs(entry.entry_price - entry.stop);
      const tp1 = entry.c1_target || entry.entry_price + sd * 1.5 * (entry.direction === "long" ? 1 : -1);
      const tp2 = entry.entry_price + sd * 3 * (entry.direction === "long" ? 1 : -1);
      const pnl = e.total_pnl || 0;
      const avgExit = e.c2_exit_price || e.c1_exit_price || entry.entry_price;
      trades.push({
        id: trades.length + 1,
        entryTime: toEpoch(entry.timestamp), exitTime: toEpoch(e.close_timestamp),
        side: entry.direction || "long", qty: entry.contracts || 2,
        entryPrice: entry.entry_price, exitPrice: avgExit,
        stopPrice: entry.stop, tp1Price: tp1, tp2Price: tp2, stopDist: sd,
        signalScore: entry.signal_score || 0,
        regime: entry.regime || e.regime || "unknown",
        htfBias: entry.htf_bias || "neutral",
        htfStrength: entry.htf_strength || 0,
        exitType: mapExitType(e), pnl: pnl,
        c1Pnl: e.c1_pnl || 0, c2Pnl: e.c2_pnl || 0,
        slippage: 0,
        rMultiple: sd > 0 ? parseFloat((pnl / (sd * 2 * 2)).toFixed(2)) : 0,
        mfe: 0, mae: 0, holdBars: 0, isCompliant: true,
      });
      entry = null;
    }
  });
  return trades;
}
function normalizeTrade(t, i) {
  return {
    id: t.id || i + 1,
    entryTime: toEpoch(t.entryTime), exitTime: toEpoch(t.exitTime),
    side: t.side || "long", qty: t.qty || 2,
    entryPrice: t.entryPrice || 0, exitPrice: t.exitPrice || 0,
    stopPrice: t.stopPrice || 0, tp1Price: t.tp1Price || 0, tp2Price: t.tp2Price || 0,
    stopDist: t.stopDist || 0, signalScore: t.signalScore || 0,
    regime: t.regime || "unknown", htfBias: t.htfBias || "neutral",
    htfStrength: t.htfStrength || 0,
    exitType: t.exitType || "stop_loss", pnl: t.pnl || 0,
    c1Pnl: t.c1Pnl || 0, c2Pnl: t.c2Pnl || 0,
    slippage: t.slippage || 0, rMultiple: t.rMultiple || 0,
    mfe: t.mfe || 0, mae: t.mae || 0, holdBars: t.holdBars || 0,
    isCompliant: t.isCompliant !== undefined ? t.isCompliant : true,
  };
}
function loadVizData(jsonData) {
  // Candles: support both formats
  const raw = jsonData.candles || jsonData.bars || [];
  const candles = raw.map(c => ({
    time: toEpoch(c.time), open: c.open, high: c.high, low: c.low, close: c.close, volume: c.volume || 0,
  })).sort((a, b) => a.time - b.time);
  // Trades: detect format
  const rawT = jsonData.trades || [];
  let trades;
  if (rawT.length > 0 && rawT[0].action) {
    trades = pairTradeEvents(rawT);
  } else {
    trades = rawT.map((t, i) => normalizeTrade(t, i));
  }
  // HTF bias snapshots
  const htfBias = (jsonData.htf_bias || jsonData.htfBias || []).map(h => ({
    time: toEpoch(h.time), direction: h.direction, strength: h.strength,
    allowsLong: h.allows_long ?? h.allowsLong ?? true,
    allowsShort: h.allows_short ?? h.allowsShort ?? true,
  })).sort((a, b) => a.time - b.time);
  // Equity curve
  const equityCurve = (jsonData.equity_curve || jsonData.equityCurve || []).map(e => ({
    equity: e.equity, time: e.time === "start" ? null : toEpoch(e.time),
  }));
  const summary = jsonData.summary || jsonData.meta || {};
  return { candles, trades, htfBias, equityCurve, summary };
}
// ── UTILITIES ─────────────────────────────────────────────────
function formatPrice(p) { return p.toFixed(2); }
function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", hour12: false });
}
function formatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}
function formatFull(ts) {
  const d = new Date(ts);
  return `${d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })} ${formatTime(ts)}`;
}
function isMaintenance(ts) {
  const d = new Date(ts);
  const h = d.getHours(), m = d.getMinutes();
  return (h === 16 && m >= 30) || h === 17 || (h === 18 && m === 0);
}
function getSession(ts) {
  const d = new Date(ts);
  const h = d.getHours(), m = d.getMinutes(), t = h * 60 + m;
  if (t >= 240 && t < 570) return "premarket";
  if (t >= 570 && t < 720) return "am_rth";
  if (t >= 720 && t < 960) return "pm_rth";
  if (t >= 960 || t < 240) return "off_hours";
  return "overnight";
}
const SESSION_COLORS = {
  premarket: "#06b6d406", am_rth: "#00c08706", pm_rth: "transparent", off_hours: "#f59e0b06", overnight: "#a855f704",
};
const SESSION_LABELS = {
  premarket: "Pre-Mkt", am_rth: "AM RTH", pm_rth: "PM RTH", off_hours: "Off-Hrs",
};
// ── MAIN COMPONENT ────────────────────────────────────────────
function NQForensicVisualizer() {
  // Data
  const [candles, setCandles] = useState([]);
  const [trades, setTrades] = useState([]);
  const [htfBiasData, setHtfBiasData] = useState([]);
  const [equityCurve, setEquityCurve] = useState([]);
  const [dataSummary, setDataSummary] = useState({});
  const [loading, setLoading] = useState(true);
  const [dataSource, setDataSource] = useState("");
  const [loadError, setLoadError] = useState(null);
  const fileInputRef = useRef(null);
  // View state
  const [viewStart, setViewStart] = useState(0);
  const [viewEnd, setViewEnd] = useState(200);
  const [selectedTrade, setSelectedTrade] = useState(null);
  const [crosshairPos, setCrosshairPos] = useState(null);
  const [hoveredCandle, setHoveredCandle] = useState(null);
  const [timeframe, setTimeframe] = useState("5m");
  // Overlay toggles
  const [showVWAP, setShowVWAP] = useState(true);
  const [showSMA, setShowSMA] = useState(true);
  const [showATR, setShowATR] = useState(false);
  const [showVolProfile, setShowVolProfile] = useState(true);
  // Hover tooltip
  const [hoveredTrade, setHoveredTrade] = useState(null);
  const [tooltipPos, setTooltipPos] = useState({ x: 0, y: 0 });
  // HTF filter threshold (from clicking HTF subpane)
  const [filterHtfMinStrength, setFilterHtfMinStrength] = useState(0);
  // Filters
  const [filterRegime, setFilterRegime] = useState("all");
  const [filterSide, setFilterSide] = useState("all");
  const [filterExit, setFilterExit] = useState("all");
  const [filterMinScore, setFilterMinScore] = useState(0.75);
  // Phase 4: A/B mode, sort, sessions
  const [abMode, setAbMode] = useState(false);
  const [abSplitIndex, setAbSplitIndex] = useState(0);
  const [sortCol, setSortCol] = useState("id");
  const [sortDir, setSortDir] = useState(1);
  const [showSessions, setShowSessions] = useState(false);
  // Refs
  const chartRef = useRef(null);
  const volRef = useRef(null);
  const regimeRef = useRef(null);
  const htfRef = useRef(null);
  const signalRef = useRef(null);
  const containerRef = useRef(null);
  const isDragging = useRef(false);
  const dragStart = useRef(0);
  const dragViewStart = useRef(0);
  // Chart dimensions
  const CHART_H = 380;
  const VOL_H = 60;
  const REGIME_H = 28;
  const HTF_H = 48;
  const SIGNAL_H = 38;
  const PRICE_AXIS_W = 85;
  const TIME_AXIS_H = 28;
  const MIN_CANDLE_W = 3;
  const MAX_CANDLE_W = 24;
  // Load data from viz_data.json or accept file upload
  const applyData = useCallback((jsonData, source) => {
    const { candles: c, trades: t, htfBias: hb, equityCurve: ec, summary: sm } = loadVizData(jsonData);
    if (c.length === 0) {
      setLoadError("No candle data found in file");
      return;
    }
    setCandles(c);
    setTrades(t);
    setHtfBiasData(hb);
    setEquityCurve(ec);
    setDataSummary(sm);
    setViewStart(Math.max(0, c.length - 250));
    setViewEnd(c.length);
    setDataSource(source);
    setLoadError(null);
    setLoading(false);
    setSelectedTrade(null);
  }, []);
  const handleFileUpload = useCallback((file) => {
    if (!file) return;
    setLoading(true);
    setLoadError(null);
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        applyData(data, `file:${file.name}`);
      } catch (err) {
        setLoadError(`Failed to parse ${file.name}: ${err.message}`);
        setLoading(false);
      }
    };
    reader.onerror = () => {
      setLoadError(`Failed to read ${file.name}`);
      setLoading(false);
    };
    reader.readAsText(file);
  }, [applyData]);
  // Init: try to fetch viz_data.json from same directory, fall back to waiting for upload
  useEffect(() => {
    fetch("viz_data.json")
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => applyData(data, "fetch:viz_data.json"))
      .catch(() => {
        // No pre-built file available — wait for drag-drop
        setLoading(false);
        setLoadError(null);
      });
  }, [applyData]);
  // Drag-drop handler for the whole page
  useEffect(() => {
    const onDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "copy"; };
    const onDrop = (e) => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith(".json")) handleFileUpload(file);
    };
    document.addEventListener("dragover", onDragOver);
    document.addEventListener("drop", onDrop);
    return () => {
      document.removeEventListener("dragover", onDragOver);
      document.removeEventListener("drop", onDrop);
    };
  }, [handleFileUpload]);
  // Filtered trades
  const filteredTrades = useMemo(() => {
    return trades.filter(t => {
      if (filterRegime !== "all" && t.regime !== filterRegime) return false;
      if (filterSide !== "all" && t.side !== filterSide) return false;
      if (filterExit !== "all" && t.exitType !== filterExit) return false;
      if (t.signalScore < filterMinScore) return false;
      if (filterHtfMinStrength > 0 && (t.htfStrength || 0) < filterHtfMinStrength) return false;
      return true;
    });
  }, [trades, filterRegime, filterSide, filterExit, filterMinScore, filterHtfMinStrength]);
  // Visible candles
  const visibleCandles = useMemo(() => {
    return candles.slice(viewStart, viewEnd);
  }, [candles, viewStart, viewEnd]);
  // Price range
  const priceRange = useMemo(() => {
    if (visibleCandles.length === 0) return { min: 0, max: 1 };
    let min = Infinity, max = -Infinity;
    visibleCandles.forEach(c => { min = Math.min(min, c.low); max = Math.max(max, c.high); });
    // Include trade levels if a trade is selected
    if (selectedTrade) {
      min = Math.min(min, selectedTrade.stopPrice, selectedTrade.entryPrice);
      max = Math.max(max, selectedTrade.tp2Price, selectedTrade.entryPrice);
    }
    const pad = (max - min) * 0.08;
    return { min: min - pad, max: max + pad };
  }, [visibleCandles, selectedTrade]);
  // Volume range
  const volRange = useMemo(() => {
    if (visibleCandles.length === 0) return { max: 1 };
    return { max: Math.max(...visibleCandles.map(c => c.volume)) };
  }, [visibleCandles]);
  // ── COMPUTED INDICATORS ────────────────────────────────────
  const indicators = useMemo(() => {
    if (candles.length === 0) return { vwap: [], sma20: [], sma50: [], sma200: [], atr: [] };
    // SMA helper
    const sma = (data, period) => {
      const out = new Array(data.length).fill(null);
      let sum = 0;
      for (let i = 0; i < data.length; i++) {
        sum += data[i].close;
        if (i >= period) sum -= data[i - period].close;
        if (i >= period - 1) out[i] = sum / period;
      }
      return out;
    };
    // VWAP — resets each day (by UTC date)
    const vwap = new Array(candles.length).fill(null);
    let cumTPV = 0, cumVol = 0, lastDay = -1;
    for (let i = 0; i < candles.length; i++) {
      const c = candles[i];
      const day = new Date(c.time).getUTCDate();
      if (day !== lastDay) { cumTPV = 0; cumVol = 0; lastDay = day; }
      const tp = (c.high + c.low + c.close) / 3;
      cumTPV += tp * c.volume;
      cumVol += c.volume;
      vwap[i] = cumVol > 0 ? cumTPV / cumVol : null;
    }
    // ATR (14-period)
    const atrPeriod = 14;
    const atr = new Array(candles.length).fill(null);
    let atrSum = 0;
    for (let i = 1; i < candles.length; i++) {
      const c = candles[i], p = candles[i - 1];
      const tr = Math.max(c.high - c.low, Math.abs(c.high - p.close), Math.abs(c.low - p.close));
      if (i <= atrPeriod) { atrSum += tr; if (i === atrPeriod) atr[i] = atrSum / atrPeriod; }
      else { atr[i] = (atr[i - 1] * (atrPeriod - 1) + tr) / atrPeriod; }
    }
    return { vwap, sma20: sma(candles, 20), sma50: sma(candles, 50), sma200: sma(candles, 200), atr };
  }, [candles]);
  // Volume profile for visible range
  const volumeProfile = useMemo(() => {
    if (visibleCandles.length === 0) return [];
    const { min, max } = priceRange;
    const buckets = 40;
    const step = (max - min) / buckets;
    if (step <= 0) return [];
    const profile = new Array(buckets).fill(0);
    visibleCandles.forEach(c => {
      const idx = Math.min(buckets - 1, Math.max(0, Math.floor((c.close - min) / step)));
      profile[idx] += c.volume;
    });
    const maxVol = Math.max(...profile);
    return profile.map((v, i) => ({ price: min + (i + 0.5) * step, volume: v, pct: maxVol > 0 ? v / maxVol : 0 }));
  }, [visibleCandles, priceRange]);
  // Regime per candle (derived from SMA crossovers)
  const regimePerCandle = useMemo(() => {
    const { sma20, sma50 } = indicators;
    return candles.map((c, i) => {
      if (!sma20[i] || !sma50[i]) return "unknown";
      if (c.close > sma20[i] && sma20[i] > sma50[i]) return "trending_up";
      if (c.close < sma20[i] && sma20[i] < sma50[i]) return "trending_down";
      return "ranging";
    });
  }, [candles, indicators]);
  // HTF bias interpolated per candle
  const htfPerCandle = useMemo(() => {
    if (htfBiasData.length === 0 || candles.length === 0) return [];
    const out = new Array(candles.length).fill(null);
    let hIdx = 0;
    for (let i = 0; i < candles.length; i++) {
      while (hIdx < htfBiasData.length - 1 && htfBiasData[hIdx + 1].time <= candles[i].time) hIdx++;
      if (htfBiasData[hIdx].time <= candles[i].time) out[i] = htfBiasData[hIdx];
    }
    return out;
  }, [candles, htfBiasData]);
  // Get chart width
  const getChartWidth = useCallback(() => {
    if (!containerRef.current) return 800;
    return containerRef.current.offsetWidth - PRICE_AXIS_W;
  }, []);
  // Coordinate transforms
  const priceToY = useCallback((price) => {
    const { min, max } = priceRange;
    return CHART_H - ((price - min) / (max - min)) * CHART_H;
  }, [priceRange]);
  const indexToX = useCallback((idx) => {
    const w = getChartWidth();
    const count = viewEnd - viewStart;
    if (count === 0) return 0;
    return ((idx - viewStart) / count) * w;
  }, [viewStart, viewEnd, getChartWidth]);
  const xToIndex = useCallback((x) => {
    const w = getChartWidth();
    const count = viewEnd - viewStart;
    return Math.floor((x / w) * count) + viewStart;
  }, [viewStart, viewEnd, getChartWidth]);
  // ── RENDER CHART ──────────────────────────────────────────
  useEffect(() => {
    const canvas = chartRef.current;
    const volCanvas = volRef.current;
    if (!canvas || !volCanvas || visibleCandles.length === 0) return;
    const w = getChartWidth() + PRICE_AXIS_W;
    const dpr = window.devicePixelRatio || 1;
    // Setup main canvas
    canvas.width = w * dpr;
    canvas.height = CHART_H * dpr;
    canvas.style.width = w + "px";
    canvas.style.height = CHART_H + "px";
    const ctx = canvas.getContext("2d");
    ctx.scale(dpr, dpr);
    // Setup volume canvas
    volCanvas.width = w * dpr;
    volCanvas.height = VOL_H * dpr;
    volCanvas.style.width = w + "px";
    volCanvas.style.height = VOL_H + "px";
    const vctx = volCanvas.getContext("2d");
    vctx.scale(dpr, dpr);
    const chartW = w - PRICE_AXIS_W;
    const count = visibleCandles.length;
    const candleW = Math.max(MIN_CANDLE_W, Math.min(MAX_CANDLE_W, chartW / count - 1));
    const bodyW = Math.max(1, candleW - 2);
    // ── Background
    ctx.fillStyle = T.bg;
    ctx.fillRect(0, 0, w, CHART_H);
    vctx.fillStyle = T.bg;
    vctx.fillRect(0, 0, w, VOL_H);
    // ── Grid lines (horizontal)
    const { min: pMin, max: pMax } = priceRange;
    const pRange = pMax - pMin;
    const gridStep = pRange > 200 ? 50 : pRange > 100 ? 25 : pRange > 50 ? 10 : 5;
    const gridStart = Math.ceil(pMin / gridStep) * gridStep;

    ctx.lineWidth = 0.5;
    ctx.setLineDash([]);

      const y = priceToY(p);

      ctx.moveTo(0, y);
      ctx.lineTo(chartW, y);
      ctx.stroke();
      // Price labels on axis
      ctx.fillStyle = T.textMuted;
      ctx.font = "11px 'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace";
      ctx.textAlign = "right";
      ctx.fillText(formatPrice(p), w - 8, y + 4);
    }

    if (showSessions) {

        const sess = getSession(c.time);
        const x = (i / count) * chartW;
        const bw = chartW / count;
        if (SESSION_COLORS[sess] && SESSION_COLORS[sess] !== "transparent") {
          ctx.fillStyle = SESSION_COLORS[sess];
          ctx.fillRect(x, 0, bw + 1, CHART_H);
        }
        if (sess !== lastSess && lastSess !== "" && SESSION_LABELS[sess]) {
          ctx.fillStyle = T.textMuted; ctx.font = "7px monospace"; ctx.textAlign = "left"; ctx.globalAlpha = 0.5;
          ctx.fillText(SESSION_LABELS[sess], x + 2, 10); ctx.globalAlpha = 1;
        }
        lastSess = sess;
      });
    } else {
      visibleCandles.forEach((c, i) => {
        if (isMaintenance(c.time)) {
          const x = (i / count) * chartW;
          ctx.fillStyle = T.maintenanceShade;
          ctx.fillRect(x, 0, candleW + 1, CHART_H);
        }
      });
    }
    // ── Day separators
    let lastDay = -1;
    visibleCandles.forEach((c, i) => {
      const d = new Date(c.time);
      const day = d.getDate();
      if (day !== lastDay && lastDay !== -1) {
        const x = (i / count) * chartW;
        ctx.strokeStyle = T.gridMajor;
        ctx.lineWidth = 0.5;
        ctx.beginPath();

    if (isDragging.current) {
      setHoveredTrade(null);
      const dx = e.clientX - dragStart.current;
      const pixelsPerCandle = chartW / (viewEnd - viewStart);
      const shift = Math.round(-dx / pixelsPerCandle);

      const range = viewEnd - viewStart;
      setViewStart(newStart);
      setViewEnd(Math.min(candles.length, newStart + range));

  const handleChartClick = useCallback((e) => {

                onChange={e => setFilterMinScore(parseFloat(e.target.value))}
                style={{ flex: 1, accentColor: T.blue }} />
              <span style={{ fontSize: 11, color: T.textBright, fontWeight: 600, minWidth: 36 }}>{filterMinScore.toFixed(2)}</span>
            </div>
            {htfBiasData.length > 0 && (
              <div style={{ marginTop: 6, display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ fontSize: 10, color: T.textMuted }}>HTF ≥</span>
                <input type="range" min="0" max="0.80" step="0.05" value={filterHtfMinStrength}
                  onChange={e => setFilterHtfMinStrength(parseFloat(e.target.value))}
                  style={{ flex: 1, accentColor: T.cyan }} />
                <span style={{ fontSize: 11, color: T.textBright, fontWeight: 600, minWidth: 36 }}>{filterHtfMinStrength.toFixed(2)}</span>
              </div>
            )}
            {hasActiveFilters && (
              <div style={{ marginTop: 6, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <span style={{ fontSize: 9, color: T.amber, fontWeight: 600, letterSpacing: 1 }}>FILTERED</span>
                <button onClick={resetFilters} style={{
                  background: "transparent", color: T.textMuted, border: `1px solid ${T.border}`,
                  padding: "2px 8px", borderRadius: 3, cursor: "pointer", fontSize: 9,
                }}>RESET</button>
              </div>
            )}
          </div>
          {/* Selected trade detail */}
          {selectedTrade && (
            <div style={{ padding: "10px 12px", borderBottom: `1px solid ${T.border}`, background: T.bgCard }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                  <button onClick={() => navigateTrade(-1)} style={{ background: T.bgHover, border: `1px solid ${T.border}`, color: T.textMuted, cursor: "pointer", fontSize: 10, padding: "1px 5px", borderRadius: 3 }}>&#9664;</button>
                  <span style={{ fontSize: 10, fontWeight: 700, color: T.textWhite, letterSpacing: 1 }}>TRADE #{selectedTrade.id}</span>
                  <button onClick={() => navigateTrade(1)} style={{ background: T.bgHover, border: `1px solid ${T.border}`, color: T.textMuted, cursor: "pointer", fontSize: 10, padding: "1px 5px", borderRadius: 3 }}>&#9654;</button>
                </div>
                <button onClick={() => setSelectedTrade(null)} style={{ background: "transparent", border: "none", color: T.textMuted, cursor: "pointer", fontSize: 12 }}>✕</button>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "4px 12px", fontSize: 10 }}>
                <div><span style={{ color: T.textMuted }}>Side</span> <span style={{ color: selectedTrade.side === "long" ? T.green : T.red, fontWeight: 600 }}>{selectedTrade.side.toUpperCase()}</span></div>
                <div><span style={{ color: T.textMuted }}>Score</span> <span style={{ color: T.blue, fontWeight: 600 }}>{selectedTrade.signalScore.toFixed(3)}</span></div>
                <div><span style={{ color: T.textMuted }}>Entry</span> <span style={{ color: T.textBright }}>{formatPrice(selectedTrade.entryPrice)}</span></div>
                <div><span style={{ color: T.textMuted }}>Exit</span> <span style={{ color: T.textBright }}>{formatPrice(selectedTrade.exitPrice)}</span></div>
                <div><span style={{ color: T.textMuted }}>Stop</span> <span style={{ color: T.red }}>{formatPrice(selectedTrade.stopPrice)} ({selectedTrade.stopDist.toFixed(1)}pt)</span></div>
                <div><span style={{ color: T.textMuted }}>R:R</span> <span style={{ color: selectedTrade.rMultiple > 0 ? T.green : T.red, fontWeight: 600 }}>{selectedTrade.rMultiple > 0 ? "+" : ""}{selectedTrade.rMultiple}R</span></div>
                <div><span style={{ color: T.textMuted }}>PnL</span> <span style={{ color: selectedTrade.pnl >= 0 ? T.green : T.red, fontWeight: 700 }}>${selectedTrade.pnl >= 0 ? "+" : ""}{selectedTrade.pnl.toFixed(2)}</span></div>
                <div><span style={{ color: T.textMuted }}>Slip</span> <span style={{ color: T.amber }}>${selectedTrade.slippage.toFixed(2)}</span></div>
                <div><span style={{ color: T.textMuted }}>C1</span> <span style={{ color: selectedTrade.c1Pnl >= 0 ? T.green : T.red }}>${selectedTrade.c1Pnl.toFixed(2)}</span></div>
                <div><span style={{ color: T.textMuted }}>C2</span> <span style={{ color: selectedTrade.c2Pnl >= 0 ? T.green : T.red }}>${selectedTrade.c2Pnl.toFixed(2)}</span></div>
                <div><span style={{ color: T.textMuted }}>MFE</span> <span style={{ color: T.green }}>{selectedTrade.mfe.toFixed(1)}pt</span></div>
                <div><span style={{ color: T.textMuted }}>MAE</span> <span style={{ color: T.red }}>{selectedTrade.mae.toFixed(1)}pt</span></div>
                <div><span style={{ color: T.textMuted }}>Regime</span> <span style={{ color: regimeColor(selectedTrade.regime) }}>{selectedTrade.regime}</span></div>
                <div><span style={{ color: T.textMuted }}>HTF</span> <span style={{ color: T.textBright }}>{selectedTrade.htfBias}</span></div>
                <div style={{ gridColumn: "1 / -1" }}><span style={{ color: T.textMuted }}>Exit</span> <span style={{ color: exitColor(selectedTrade.exitType), fontWeight: 600 }}>{selectedTrade.exitType.replace(/_/g, " ").toUpperCase()}</span></div>
                <div style={{ gridColumn: "1 / -1" }}><span style={{ color: T.textMuted }}>Hold</span> <span style={{ color: T.textBright }}>{selectedTrade.holdBars} bars</span> <span style={{ color: T.textMuted, marginLeft: 8 }}>{formatFull(selectedTrade.entryTime)}</span></div>
                <div style={{ gridColumn: "1 / -1", display: "flex", alignItems: "center", gap: 4, marginTop: 2 }}>
                  <span style={{ color: T.textMuted }}>Compliance</span>
                  <span style={{ background: selectedTrade.isCompliant ? "#0a2a1a" : "#2a0a0e", color: selectedTrade.isCompliant ? T.green : T.red, padding: "1px 6px", borderRadius: 3, fontSize: 9, fontWeight: 700 }}>
                    {selectedTrade.isCompliant ? "✓ PASS" : "✗ VIOLATION"}
                  </span>
                </div>
              </div>
            </div>
          )}
          {/* A/B Comparison Panel */}
          {abMode && abStats && (
            <div style={{ padding: "8px 12px", borderBottom: `1px solid ${T.border}`, background: T.bgCard }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                <span style={{ fontSize: 9, color: T.textMuted, letterSpacing: 2 }}>A/B SPLIT</span>
                <span style={{ fontSize: 9, color: T.textMuted }}>Trade #{abStats.split}</span>
              </div>
              <input type="range" min="1" max={Math.max(2, filteredTrades.length - 1)} step="1" value={abSplitIndex || Math.floor(filteredTrades.length / 2)}
                onChange={e => setAbSplitIndex(parseInt(e.target.value))}
                style={{ width: "100%", accentColor: T.purple, marginBottom: 6 }} />
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6 }}>
                {[{ label: "A", data: abStats.a, color: T.blue }, { label: "B", data: abStats.b, color: T.purple }].map(g => g.data && (
                  <div key={g.label} style={{ background: T.bg, borderRadius: 4, padding: "6px 8px", border: `1px solid ${g.color}30` }}>
                    <div style={{ fontSize: 10, fontWeight: 700, color: g.color, marginBottom: 4 }}>GROUP {g.label} ({g.data.count})</div>
                    <div style={{ fontSize: 9, display: "grid", gap: 2 }}>
                      <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: T.textMuted }}>Win%</span><span style={{ color: parseFloat(g.data.winRate) > 55 ? T.green : T.amber }}>{g.data.winRate}%</span></div>
                      <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: T.textMuted }}>PF</span><span style={{ color: parseFloat(g.data.pf) > 1.5 ? T.green : parseFloat(g.data.pf) > 1 ? T.amber : T.red }}>{g.data.pf}</span></div>
                      <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: T.textMuted }}>Total</span><span style={{ color: parseFloat(g.data.totalPnl) >= 0 ? T.green : T.red }}>${g.data.totalPnl}</span></div>
                      <div style={{ display: "flex", justifyContent: "space-between" }}><span style={{ color: T.textMuted }}>Avg</span><span style={{ color: parseFloat(g.data.avgPnl) >= 0 ? T.green : T.red }}>${g.data.avgPnl}</span></div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
          {/* Trade table */}
          <div style={{ flex: 1, overflow: "auto" }}>
            <div style={{ padding: "8px 12px 4px", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontSize: 9, color: T.textMuted, letterSpacing: 2 }}>TRADE LOG — {filteredTrades.length} TRADES</span>
              <button onClick={exportCSV} style={{
                background: T.bgCard, color: T.textMuted, border: `1px solid ${T.border}`,
                padding: "2px 8px", borderRadius: 3, cursor: "pointer", fontSize: 8, letterSpacing: 1,
              }}>CSV</button>
            </div>
            <div style={{ fontSize: 10 }}>
              {/* Sortable header */}
              <div style={{ display: "grid", gridTemplateColumns: "26px 34px 50px 44px 48px 50px 44px", gap: 2, padding: "4px 12px", borderBottom: `1px solid ${T.border}`, color: T.textMuted, fontSize: 8, letterSpacing: 0.5, position: "sticky", top: 0, background: T.bgPanel, zIndex: 1 }}>
                {[
                  { col: "id", label: "#" }, { col: "side", label: "SIDE" }, { col: "entry", label: "ENTRY" },
                  { col: "stop", label: "STOP" }, { col: "pnl", label: "PNL" }, { col: "exit", label: "EXIT" }, { col: "regime", label: "REGIME" },
                ].map(h => (
                  <span key={h.col} onClick={() => handleSort(h.col)} style={{ cursor: "pointer", color: sortCol === h.col ? T.textBright : T.textMuted, userSelect: "none" }}>
                    {h.label}{sortCol === h.col ? (sortDir > 0 ? " ▲" : " ▼") : ""}
                  </span>
                ))}
              </div>
              {sortedTrades.map((t, ti) => (
                <div key={t.id} onClick={() => focusTrade(t)}
                  style={{
                    display: "grid", gridTemplateColumns: "26px 34px 50px 44px 48px 50px 44px", gap: 2,
                    padding: "5px 12px", cursor: "pointer", borderBottom: `1px solid ${T.border}08`,
                    background: selectedTrade?.id === t.id ? T.bgActive : (abMode && abStats ? (ti < abStats.split ? `${T.blue}08` : `${T.purple}08`) : "transparent"),
                    transition: "background 0.15s",
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = selectedTrade?.id === t.id ? T.bgActive : T.bgHover}
                  onMouseLeave={e => e.currentTarget.style.background = selectedTrade?.id === t.id ? T.bgActive : (abMode && abStats ? (ti < abStats.split ? `${T.blue}08` : `${T.purple}08`) : "transparent")}
                >
                  <span style={{ color: T.textMuted }}>{t.id}</span>
                  <span style={{ color: t.side === "long" ? T.green : T.red, fontWeight: 600 }}>{t.side === "long" ? "LNG" : "SHT"}</span>
                  <span style={{ color: T.textBright }}>{formatPrice(t.entryPrice)}</span>
                  <span style={{ color: T.textMuted }}>{t.stopDist.toFixed(0)}pt</span>
                  <span style={{ color: t.pnl >= 0 ? T.green : T.red, fontWeight: 600 }}>{t.pnl >= 0 ? "+" : ""}{t.pnl.toFixed(0)}</span>
                  <span style={{ color: exitColor(t.exitType), fontSize: 8 }}>{t.exitType.replace(/_/g, " ").split(" ").map(w => w[0].toUpperCase()).join("")}</span>
                  <span style={{ fontSize: 8 }}>
                    <span style={{ display: "inline-block", width: 5, height: 5, borderRadius: "50%", background: regimeColor(t.regime), marginRight: 3 }}></span>
                    {t.regime.replace("trending_", "T").replace("unknown", "UNK").replace("ranging", "RNG").substring(0, 3).toUpperCase()}
                  </span>
                </div>
              ))}
            </div>
          </div>
          {/* Legend */}
          <div style={{ padding: "8px 12px", borderTop: `1px solid ${T.border}`, fontSize: 9, color: T.textMuted }}>
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
              <span><span style={{ color: T.blue }}>●</span> PT1</span>
              <span><span style={{ color: T.purple }}>●</span> PT2</span>
              <span><span style={{ color: T.green }}>●</span> Trail</span>
              <span><span style={{ color: T.red }}>●</span> Stop</span>
              <span><span style={{ color: T.amber }}>●</span> BE+</span>
            </div>
            <div style={{ marginTop: 4, color: T.textMuted, fontSize: 8 }}>Scroll zoom · Drag pan · Click trade · Dbl-click reset · ←→ nav · Esc deselect · Drop JSON</div>
          </div>
        </div>
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(NQForensicVisualizer));
  </script>
</body>
</html>

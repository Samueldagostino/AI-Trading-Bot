<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NQ Bot — Live Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#FDFBF9;--surface:#FFFFFF;--surface-alt:#FAF7F4;--surface-hover:#F5F0EB;
  --border:#E8DDD3;--border-light:#F0EAE3;
  --text:#3D2E22;--text2:#8B7355;--text-muted:#B8A48E;
  --accent:#8B6914;--accent-soft:#F5ECD7;
  --green:#2D8C4E;--green-bg:#ECFAEF;--green-border:#B8E4C4;--green-light:#D6F5DF;
  --red:#C53D1B;--red-bg:#FDE8E2;--red-border:#EAADA0;--red-light:#FBD5CC;
  --amber:#B08515;--amber-bg:#FDF2D0;--amber-border:#E4C878;
  --blue:#2563EB;--blue-bg:#EFF6FF;--blue-border:#93C5FD;
  --brown-900:#3D2E22;--brown-700:#5C4333;--brown-500:#8B7355;
  --brown-400:#A89070;--brown-200:#DDD0C0;--brown-100:#EDE5DA;
  --mono:'JetBrains Mono','Fira Code','Consolas',monospace;
  --sans:'Inter',system-ui,-apple-system,sans-serif;
  --ease-out-expo:cubic-bezier(0.16,1,0.3,1);
  --shadow-sm:0 1px 3px rgba(61,46,34,0.06);
  --shadow-md:0 4px 16px rgba(61,46,34,0.08);
  --shadow-lg:0 8px 32px rgba(61,46,34,0.10);
  --radius:12px;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);line-height:1.5;min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
a{color:var(--accent);text-decoration:none}a:hover{text-decoration:underline}

/* ═══ NAV ═══ */
.nav{position:fixed;top:0;left:0;right:0;height:52px;background:var(--surface);border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;padding:0 28px;z-index:100;box-shadow:var(--shadow-sm)}
.nav-logo{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:3px;text-transform:uppercase}
.nav-links{display:flex;gap:0}
.nav-link{font-size:12px;font-weight:600;color:var(--text-muted);padding:16px 18px;text-decoration:none;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
.nav-link:hover{color:var(--text);text-decoration:none}
.nav-link.active{color:var(--accent);border-bottom-color:var(--accent)}

/* ═══ LAYOUT ═══ */
.container{max-width:1100px;margin:0 auto;padding:68px 20px 48px}

/* ═══ STATUS BAR ═══ */
.status-bar{display:flex;align-items:center;gap:14px;padding:10px 20px;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);margin-bottom:16px;flex-wrap:wrap;box-shadow:var(--shadow-sm)}
.status-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.status-dot.live{background:var(--green);box-shadow:0 0 6px rgba(45,140,78,0.5);animation:pulse-g 2s infinite}
.status-dot.offline{background:var(--red);box-shadow:0 0 6px rgba(197,61,27,0.5)}
@keyframes pulse-g{0%,100%{opacity:1;box-shadow:0 0 6px rgba(45,140,78,0.5)}50%{opacity:.5;box-shadow:0 0 14px rgba(45,140,78,0)}}
.status-lbl{font-weight:700;font-family:var(--mono);letter-spacing:1.5px;font-size:11px}
.status-lbl.live{color:var(--green)}
.status-lbl.offline{color:var(--red)}
.sep{width:1px;height:16px;background:var(--border)}
.si{color:var(--text2);font-family:var(--mono);font-size:11px}
.si b{color:var(--text);font-weight:600}

/* ═══ PNL HERO ═══ */
.pnl-hero{text-align:center;padding:28px 20px 24px;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);margin-bottom:16px;box-shadow:var(--shadow-sm)}
.pnl-number{font-size:52px;font-weight:800;font-family:var(--mono);line-height:1.1;font-variant-numeric:tabular-nums;letter-spacing:-1px}
.pnl-number.pos{color:var(--green)}
.pnl-number.neg{color:var(--red)}
.pnl-number.flat{color:var(--text-muted)}
.pnl-sub{font-size:12px;color:var(--text-muted);margin-top:4px;font-weight:500;letter-spacing:.5px}
.kpi-row{display:flex;justify-content:center;gap:28px;margin-top:16px;flex-wrap:wrap}
.kpi-item{text-align:center}
.kpi-val{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--brown-900);font-variant-numeric:tabular-nums}
.kpi-val.green{color:var(--green)}
.kpi-val.red{color:var(--red)}
.kpi-lbl{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* ═══ OPEN POSITION ═══ */
.open-pos{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);padding:18px 22px;margin-bottom:16px;box-shadow:var(--shadow-sm);display:none}
.open-pos.show{display:block;animation:slideDown .35s var(--ease-out-expo)}
@keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.op-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.dir-pill{padding:5px 16px;border-radius:6px;font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:1px}
.dir-pill.long{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.dir-pill.short{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.op-tag{font-size:11px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:1px}
.op-details{display:flex;gap:22px;margin-top:12px;flex-wrap:wrap}
.op-item{display:flex;flex-direction:column;gap:1px}
.op-item .ol{font-size:10px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.op-item .ov{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--text)}
.legs-row{display:flex;gap:5px;margin-top:10px}
.leg-pill{padding:3px 10px;border-radius:5px;font-family:var(--mono);font-size:10px;font-weight:700}
.leg-pill.on{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.leg-pill.off{background:var(--surface-alt);color:var(--text-muted);border:1px solid var(--border-light)}

/* ═══ SECTION TITLE ═══ */
.sec-title{display:flex;align-items:center;gap:10px;margin:20px 0 12px}
.sec-title h2{font-size:13px;font-weight:700;color:var(--brown-900);letter-spacing:1px;text-transform:uppercase}
.sec-title .cnt{font-family:var(--mono);font-size:10px;color:var(--text-muted);background:var(--surface-alt);padding:2px 8px;border-radius:4px;border:1px solid var(--border-light)}

/* ═══ TRADE CARDS ═══ */
.trade-cards{display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.tc{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);padding:14px 18px;cursor:pointer;transition:border-color .2s,box-shadow .2s,transform .15s;position:relative;overflow:hidden}
.tc:hover{border-color:var(--border);box-shadow:var(--shadow-md);transform:translateY(-1px)}
.tc.win{border-left:3px solid var(--green)}
.tc.loss{border-left:3px solid var(--red)}
.tc-enter{animation:cardIn .45s var(--ease-out-expo)}
@keyframes cardIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
.tc-head{display:flex;align-items:center;gap:12px}
.tc-icon{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:20px;font-weight:800;font-family:var(--mono);flex-shrink:0}
.tc-icon.long{background:var(--green-bg);color:var(--green)}
.tc-icon.short{background:var(--red-bg);color:var(--red)}
.tc-mid{flex:1;min-width:0}
.tc-dir{font-size:12px;font-weight:700;letter-spacing:1px;font-family:var(--mono)}
.tc-dir.long{color:var(--green)}
.tc-dir.short{color:var(--red)}
.tc-price{font-family:var(--mono);font-size:11px;color:var(--text2);margin-top:1px}
.tc-right{text-align:right;flex-shrink:0}
.tc-pnl{font-family:var(--mono);font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.tc-pnl.pos{color:var(--green)}
.tc-pnl.neg{color:var(--red)}
.tc-pts{font-family:var(--mono);font-size:10px;color:var(--text-muted);margin-top:1px}
.tc-time{font-family:var(--mono);font-size:10px;color:var(--text-muted);position:absolute;top:10px;right:14px}
.tc-chips{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap}
.chip{padding:3px 9px;border-radius:5px;font-family:var(--mono);font-size:10px;font-weight:600;white-space:nowrap}
.chip.win{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.chip.lose{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.chip.na{background:var(--surface-alt);color:var(--text-muted);border:1px solid var(--border-light)}
/* Expanded detail */
.tc-exp{max-height:0;overflow:hidden;transition:max-height .3s var(--ease-out-expo)}
.tc-exp.open{max-height:180px;padding-top:10px}
.tc-exp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:8px;font-size:11px;border-top:1px solid var(--border-light);padding-top:10px}
.tc-exp-item .el{color:var(--text-muted);font-size:9px;text-transform:uppercase;letter-spacing:.5px}
.tc-exp-item .ev{font-family:var(--mono);color:var(--text);font-weight:500}

/* ═══ EMPTY STATE ═══ */
.empty{text-align:center;padding:56px 20px;background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);margin-bottom:20px}
.empty .ring{width:36px;height:36px;border:3px solid var(--green);border-radius:50%;border-top-color:transparent;animation:spin 1.1s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty p{color:var(--text-muted);font-size:12px;font-family:var(--mono)}

/* ═══ SESSION SUMMARY ═══ */
.sess-foot{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);padding:18px 22px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.sf-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px}
.sf-cell{text-align:center;padding:8px 4px}
.sf-cell .sfl{font-size:9px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.sf-cell .sfv{font-family:var(--mono);font-size:15px;font-weight:700;font-variant-numeric:tabular-nums}
.sf-cell .sfv.pos{color:var(--green)}
.sf-cell .sfv.neg{color:var(--red)}

/* ═══ ACTIVITY FEED ═══ */
.af{background:var(--surface);border:1px solid var(--border-light);border-radius:var(--radius);padding:14px 18px;margin-bottom:16px;box-shadow:var(--shadow-sm)}
.af-row{display:flex;align-items:center;gap:10px;padding:5px 0;border-bottom:1px solid var(--border-light);font-size:12px}
.af-row:last-child{border-bottom:none}
.af-t{font-family:var(--mono);font-size:10px;color:var(--text-muted);width:76px;flex-shrink:0}
.af-b{padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.5px}
.af-b.approved{background:var(--green-bg);color:var(--green)}
.af-b.rejected{background:var(--red-bg);color:var(--red)}
.af-b.exit{background:var(--amber-bg);color:var(--amber)}
.af-msg{color:var(--text2);font-size:11px;flex:1}

/* ═══ REFRESH STRIP ═══ */
.rstrip{display:flex;align-items:center;justify-content:space-between;padding:6px 0;font-size:10px;color:var(--text-muted);font-family:var(--mono)}
.rbar{width:50px;height:2px;background:var(--border-light);border-radius:1px;overflow:hidden;margin-left:8px;display:inline-block;vertical-align:middle}
.rbar-fill{height:100%;background:var(--green);transition:width 1s linear}

/* ═══ RISK DISC ═══ */
.risk-disc{padding:24px 0 16px;text-align:center;font-family:var(--mono);font-size:10px;color:var(--text-muted);line-height:1.7;max-width:700px;margin:0 auto}

/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
  .nav{padding:0 16px}
  .nav-logo{font-size:10px;letter-spacing:2px}
  .nav-link{font-size:11px;padding:16px 10px}
  .container{padding:60px 12px 32px}
  .pnl-number{font-size:38px}
  .kpi-row{gap:16px}
  .kpi-val{font-size:16px}
  .status-bar{gap:6px;padding:8px 12px}
  .sep{display:none}
  .tc-pnl{font-size:16px}
  .tc-icon{width:30px;height:30px;font-size:16px}
  .sf-grid{grid-template-columns:repeat(3,1fr)}
  .op-details{gap:14px}
}
@media(max-width:480px){
  .pnl-number{font-size:30px}
  .kpi-row{gap:12px}
  .sf-grid{grid-template-columns:repeat(2,1fr)}
  .tc-chips{gap:3px}
  .chip{font-size:9px;padding:2px 6px}
}
</style>
</head>
<body>

<nav class="nav">
  <span class="nav-logo">NQ Trading System</span>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Overview</a>
    <a href="live.html" class="nav-link active">Live</a>
    <a href="weekly-dashboard.html" class="nav-link">Weekly</a>
    <a href="analyzer.html" class="nav-link">Analyzer</a>
  </div>
</nav>

<div class="container">
  <div id="app"></div>
  <div class="risk-disc">
    RISK DISCLOSURE: Past performance does not guarantee future results.
    Futures trading carries substantial risk of loss and is not suitable for all investors.
    All metrics shown are from paper simulation unless explicitly labeled as live.
  </div>
</div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const POLL_INTERVAL = 30;
const DATA_URL = 'data/live_stats.json';

function App() {
  const [data, setData] = useState(null);
  const [countdown, setCountdown] = useState(POLL_INTERVAL);
  const [expanded, setExpanded] = useState(null);
  const [error, setError] = useState(false);

  const fetchData = useCallback(async () => {
    try {
      const res = await fetch(DATA_URL + '?t=' + Date.now());
      if (!res.ok) throw new Error('fetch failed');
      const json = await res.json();
      setData(json);
      setError(false);
      setCountdown(POLL_INTERVAL);
    } catch (e) {
      setError(true);
    }
  }, []);

  useEffect(() => {
    fetchData();
    const iv = setInterval(fetchData, POLL_INTERVAL * 1000);
    return () => clearInterval(iv);
  }, [fetchData]);

  useEffect(() => {
    const t = setInterval(() => setCountdown(c => Math.max(0, c - 1)), 1000);
    return () => clearInterval(t);
  }, []);

  if (!data) {
    return (
      <div className="empty">
        <div className="ring"></div>
        <p>Connecting to live data feed...</p>
      </div>
    );
  }

  const isLive = data.status === 'LIVE';
  const trades = data.trade_log || [];
  const op = data.active_trade || null;
  const decs = data.recent_decisions || [];

  return (
    <>
      <StatusBar data={data} isLive={isLive} />
      <PnlHero data={data} trades={trades} />
      <DailyPnl data={data} trades={trades} />
      {op && <OpenPosition pos={op} />}
      <TradeLog trades={trades} expanded={expanded} setExpanded={setExpanded} />
      <SessionFooter trades={trades} />
      <ActivityFeed decs={decs} />
      <RefreshStrip countdown={countdown} error={error} updated={data.updated} />
    </>
  );
}

/* ── DAILY PNL SUMMARY ── */
function DailyPnl({ data, trades }) {
  if (!trades || trades.length === 0) return null;
  // Group trades by date
  const byDay = {};
  trades.forEach(t => {
    const d = t.date || (t.time ? t.time.split(' ')[0] : 'Today');
    if (!byDay[d]) byDay[d] = { wins: 0, losses: 0, pnl: 0 };
    byDay[d].pnl += (t.total_pnl || 0);
    if ((t.total_pnl || 0) > 0) byDay[d].wins++;
    else byDay[d].losses++;
  });
  const days = Object.keys(byDay).sort().reverse();
  if (days.length === 0) return null;
  let cum = 0;
  const cumMap = {};
  Object.keys(byDay).sort().forEach(d => { cum += byDay[d].pnl; cumMap[d] = cum; });

  return (
    <div style={{background:'var(--surface)',border:'1px solid var(--border-light)',borderRadius:'var(--radius)',padding:'16px 20px',marginBottom:'16px',boxShadow:'var(--shadow-sm)'}}>
      <div style={{fontSize:'11px',fontWeight:'700',color:'var(--brown-900)',letterSpacing:'1px',textTransform:'uppercase',marginBottom:'10px'}}>Daily PnL</div>
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontFamily:'var(--mono)',fontSize:'12px'}}>
          <thead>
            <tr>
              <th style={{textAlign:'left',padding:'6px 10px',borderBottom:'2px solid var(--border)',color:'var(--text-muted)',fontSize:'10px',textTransform:'uppercase',letterSpacing:'.5px'}}>Date</th>
              <th style={{textAlign:'right',padding:'6px 10px',borderBottom:'2px solid var(--border)',color:'var(--text-muted)',fontSize:'10px',textTransform:'uppercase',letterSpacing:'.5px'}}>Trades</th>
              <th style={{textAlign:'right',padding:'6px 10px',borderBottom:'2px solid var(--border)',color:'var(--text-muted)',fontSize:'10px',textTransform:'uppercase',letterSpacing:'.5px'}}>WR</th>
              <th style={{textAlign:'right',padding:'6px 10px',borderBottom:'2px solid var(--border)',color:'var(--text-muted)',fontSize:'10px',textTransform:'uppercase',letterSpacing:'.5px'}}>PnL</th>
              <th style={{textAlign:'right',padding:'6px 10px',borderBottom:'2px solid var(--border)',color:'var(--text-muted)',fontSize:'10px',textTransform:'uppercase',letterSpacing:'.5px'}}>Cumulative</th>
            </tr>
          </thead>
          <tbody>
            {days.map(d => {
              const day = byDay[d];
              const total = day.wins + day.losses;
              const wr = total > 0 ? ((day.wins / total) * 100).toFixed(0) : '0';
              const pnlColor = day.pnl >= 0 ? 'var(--green)' : 'var(--red)';
              const cumColor = cumMap[d] >= 0 ? 'var(--green)' : 'var(--red)';
              const sign = day.pnl >= 0 ? '+' : '';
              const cumSign = cumMap[d] >= 0 ? '+' : '';
              return (
                <tr key={d}>
                  <td style={{textAlign:'left',padding:'7px 10px',borderBottom:'1px solid var(--border-light)',fontWeight:'600'}}>{d}</td>
                  <td style={{textAlign:'right',padding:'7px 10px',borderBottom:'1px solid var(--border-light)'}}>{total}</td>
                  <td style={{textAlign:'right',padding:'7px 10px',borderBottom:'1px solid var(--border-light)'}}>{wr}%</td>
                  <td style={{textAlign:'right',padding:'7px 10px',borderBottom:'1px solid var(--border-light)',color:pnlColor,fontWeight:'600'}}>{sign}${Math.abs(day.pnl).toFixed(2)}</td>
                  <td style={{textAlign:'right',padding:'7px 10px',borderBottom:'1px solid var(--border-light)',color:cumColor,fontWeight:'600'}}>{cumSign}${Math.abs(cumMap[d]).toFixed(2)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── SECTION A: STATUS BAR ── */
function StatusBar({ data, isLive }) {
  const hb = data.heartbeat || {};
  const st = data.state || {};
  const htf = data.htf_bias || 'NEUTRAL';
  const htfColor = htf === 'BULLISH' ? 'var(--green)' : htf === 'BEARISH' ? 'var(--red)' : 'var(--text-muted)';

  return (
    <div className="status-bar">
      <div className={'status-dot ' + (isLive ? 'live' : 'offline')}></div>
      <span className={'status-lbl ' + (isLive ? 'live' : 'offline')}>
        {isLive ? 'LIVE' : 'OFFLINE'}
      </span>
      <div className="sep"></div>
      <span className="si"><b>{data.trading_mode || 'PAPER'}</b></span>
      <div className="sep"></div>
      <span className="si">HTF: <b style={{color:htfColor}}>{htf}</b></span>
      <div className="sep"></div>
      <span className="si">Bars: <b>{data.bars_processed || 0}</b></span>
      <div className="sep"></div>
      <span className="si">NQ: <b>{data.last_price ? data.last_price.toLocaleString(undefined,{minimumFractionDigits:2}) : '—'}</b></span>
      <div className="sep"></div>
      <span className="si">Conn: <b style={{color: hb.connection_quality === 'good' ? 'var(--green)' : 'var(--amber)'}}>{hb.connection_quality || '—'}</b></span>
    </div>
  );
}

/* ── SECTION B: PNL HERO ── */
function PnlHero({ data, trades }) {
  const pnl = data.session_pnl_pct || 0;
  const cls = pnl > 0 ? 'pos' : pnl < 0 ? 'neg' : 'flat';
  const sign = pnl > 0 ? '+' : '';

  // Compute wins/losses from trade log
  const wins = trades.filter(t => t.total_pnl > 0).length;
  const losses = trades.filter(t => t.total_pnl <= 0).length;
  const totalTrades = data.trades_today || trades.length;

  return (
    <div className="pnl-hero">
      <div className={'pnl-number ' + cls}>
        {sign}{pnl.toFixed(3)}%
      </div>
      <div className="pnl-sub">Session PnL — Today</div>
      <div className="kpi-row">
        <div className="kpi-item">
          <div className="kpi-val">{totalTrades}</div>
          <div className="kpi-lbl">Trades</div>
        </div>
        <div className="kpi-item">
          <div className="kpi-val green">{wins}</div>
          <div className="kpi-lbl">Wins</div>
        </div>
        <div className="kpi-item">
          <div className="kpi-val red">{losses}</div>
          <div className="kpi-lbl">Losses</div>
        </div>
        <div className="kpi-item">
          <div className="kpi-val">{(data.win_rate || 0).toFixed(1)}%</div>
          <div className="kpi-lbl">Win Rate</div>
        </div>
        <div className="kpi-item">
          <div className="kpi-val">{(data.profit_factor || 0).toFixed(2)}</div>
          <div className="kpi-lbl">Profit Factor</div>
        </div>
      </div>
    </div>
  );
}

/* ── SECTION C: OPEN POSITION ── */
function OpenPosition({ pos }) {
  const dir = (pos.side || pos.direction || '').toUpperCase();
  const isLong = dir === 'LONG' || dir === 'BUY';
  const dc = isLong ? 'long' : 'short';
  const dirLabel = isLong ? 'LONG' : 'SHORT';
  const legsOpen = pos.legs_open || pos.active_legs || 0;
  const names = ['C1','C2','C3','C4'];

  return (
    <div className="open-pos show">
      <div className="op-row">
        <span className={'dir-pill ' + dc}>{dirLabel}</span>
        <span className="op-tag">Open Position</span>
      </div>
      <div className="op-details">
        <div className="op-item">
          <span className="ol">Entry</span>
          <span className="ov">{fmt(pos.entry_price)}</span>
        </div>
        <div className="op-item">
          <span className="ol">Stop</span>
          <span className="ov" style={{color:'var(--red)'}}>{fmt(pos.current_stop || pos.stop_price)}</span>
        </div>
        <div className="op-item">
          <span className="ol">Legs Open</span>
          <span className="ov">{legsOpen}</span>
        </div>
      </div>
      <div className="legs-row">
        {names.map((n, i) => (
          <span key={n} className={'leg-pill ' + (i < legsOpen ? 'on' : 'off')}>{n}</span>
        ))}
      </div>
    </div>
  );
}

/* ── SECTION D: TRADE LOG (15 visible, show more) ── */
function TradeLog({ trades, expanded, setExpanded }) {
  const [showAll, setShowAll] = useState(false);
  const VISIBLE_COUNT = 15;
  const rev = [...trades].reverse();
  const visible = showAll ? rev : rev.slice(0, VISIBLE_COUNT);
  const hiddenCount = rev.length - VISIBLE_COUNT;
  const toggle = (idx) => setExpanded(expanded === idx ? null : idx);

  return (
    <div>
      <div className="sec-title">
        <h2>Trade Log</h2>
        <span className="cnt">{trades.length} trades</span>
      </div>
      {trades.length === 0 ? (
        <div className="empty">
          <div className="ring"></div>
          <p>Scanning for high-confluence setups...</p>
        </div>
      ) : (
        <>
          <div className="trade-cards">
            {visible.map((t, i) => (
              <TradeCard key={i} idx={i} t={t} open={expanded === i}
                onClick={() => toggle(i)} />
            ))}
          </div>
          {!showAll && hiddenCount > 0 && (
            <div style={{textAlign:'center',padding:'14px 0'}}>
              <button onClick={() => setShowAll(true)} style={{
                background:'var(--surface)',border:'1px solid var(--border)',
                borderRadius:'8px',padding:'10px 28px',cursor:'pointer',
                fontFamily:'var(--mono)',fontSize:'12px',fontWeight:'600',
                color:'var(--accent)',transition:'all .2s',
                boxShadow:'var(--shadow-sm)'
              }}
              onMouseOver={e => {e.target.style.borderColor='var(--accent)';e.target.style.background='var(--accent-soft)'}}
              onMouseOut={e => {e.target.style.borderColor='var(--border)';e.target.style.background='var(--surface)'}}
              >Show {hiddenCount} more trades</button>
            </div>
          )}
          {showAll && hiddenCount > 0 && (
            <div style={{textAlign:'center',padding:'14px 0'}}>
              <button onClick={() => setShowAll(false)} style={{
                background:'var(--surface)',border:'1px solid var(--border)',
                borderRadius:'8px',padding:'10px 28px',cursor:'pointer',
                fontFamily:'var(--mono)',fontSize:'12px',fontWeight:'600',
                color:'var(--text-muted)',transition:'all .2s'
              }}>Show less</button>
            </div>
          )}
        </>
      )}
    </div>
  );
}

function TradeCard({ t, idx, open, onClick }) {
  const pnl = t.total_pnl || 0;
  const w = pnl > 0;
  const lo = (t.direction || '').toUpperCase() === 'LONG';
  const arrow = lo ? '\u2191' : '\u2193';
  const sP = pnl > 0 ? '+' : '';

  // Build leg data from flat fields
  const legData = [
    { name: 'C1', pnl: t.c1_pnl || 0, reason: t.c1_reason || '', contracts: 1 },
    { name: 'C2', pnl: t.c2_pnl || 0, reason: t.c2_reason || '', contracts: 1 },
    { name: 'C3', pnl: t.c3_pnl || 0, reason: t.c3_reason || '', contracts: 3 },
    { name: 'C4', pnl: t.c4_pnl || 0, reason: t.c4_reason || '', contracts: 0 },
  ];

  return (
    <div className={'tc ' + (w ? 'win' : 'loss') + ' tc-enter'} onClick={onClick}>
      <span className="tc-time">{t.time}</span>
      <div className="tc-head">
        <div className={'tc-icon ' + (lo ? 'long' : 'short')}>{arrow}</div>
        <div className="tc-mid">
          <div className={'tc-dir ' + (lo ? 'long' : 'short')}>{(t.direction || '').toUpperCase()}</div>
          <div className="tc-price">
            Entry: {fmt(t.entry_price)}
            {t.signal_source ? <span style={{marginLeft:'8px',opacity:0.6}}>{t.signal_source}</span> : null}
          </div>
        </div>
        <div className="tc-right">
          <div className={'tc-pnl ' + (w ? 'pos' : 'neg')}>{sP}${Math.abs(pnl).toFixed(2)}</div>
          <div className="tc-pts">{t.contracts || 5} contracts</div>
        </div>
      </div>
      <div className="tc-chips">
        {legData.map(leg => {
          if (leg.contracts === 0 && leg.pnl === 0) return <span key={leg.name} className="chip na">{leg.name}: —</span>;
          const s = leg.pnl > 0 ? '+' : '';
          return <span key={leg.name} className={'chip ' + (leg.pnl > 0 ? 'win' : leg.pnl < 0 ? 'lose' : 'na')}>
            {leg.name}: {s}${leg.pnl.toFixed(2)}
          </span>;
        })}
      </div>
      <div className={'tc-exp ' + (open ? 'open' : '')}>
        <div className="tc-exp-grid">
          <div className="tc-exp-item">
            <div className="el">Signal</div>
            <div className="ev">{t.signal_source || '—'}</div>
          </div>
          <div className="tc-exp-item">
            <div className="el">Score</div>
            <div className="ev">{t.signal_score ? t.signal_score.toFixed(3) : '—'}</div>
          </div>
          <div className="tc-exp-item">
            <div className="el">HTF Bias</div>
            <div className="ev">{t.htf_bias || '—'}</div>
          </div>
          <div className="tc-exp-item">
            <div className="el">Regime</div>
            <div className="ev">{t.regime || '—'}</div>
          </div>
          {legData.filter(l => l.contracts > 0).map(leg => (
            <div key={leg.name} className="tc-exp-item">
              <div className="el">{leg.name} Exit</div>
              <div className="ev" style={{color: leg.pnl > 0 ? 'var(--green)' : leg.pnl < 0 ? 'var(--red)' : 'inherit'}}>
                {leg.reason || '—'}
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── SECTION E: SESSION SUMMARY ── */
function SessionFooter({ trades }) {
  if (!trades || trades.length === 0) return null;

  const totals = { C1: 0, C2: 0, C3: 0, C4: 0 };
  trades.forEach(t => {
    totals.C1 += (t.c1_pnl || 0);
    totals.C2 += (t.c2_pnl || 0);
    totals.C3 += (t.c3_pnl || 0);
    totals.C4 += (t.c4_pnl || 0);
  });

  let best = trades[0], worst = trades[0];
  trades.forEach(t => {
    const p = t.total_pnl || 0;
    if (p > (best.total_pnl || 0)) best = t;
    if (p < (worst.total_pnl || 0)) worst = t;
  });

  const bestPnl = best.total_pnl || 0;
  const worstPnl = worst.total_pnl || 0;

  return (
    <div>
      <div className="sec-title" style={{marginTop:'20px'}}>
        <h2>Session Summary</h2>
      </div>
      <div className="sess-foot">
        <div className="sf-grid">
          {['C1','C2','C3','C4'].map(n => (
            <div key={n} className="sf-cell">
              <div className="sfl">{n} Total</div>
              <div className={'sfv ' + (totals[n] > 0 ? 'pos' : totals[n] < 0 ? 'neg' : '')}>
                {totals[n] > 0 ? '+' : ''}${totals[n].toFixed(2)}
              </div>
            </div>
          ))}
          <div className="sf-cell">
            <div className="sfl">Best Trade</div>
            <div className="sfv pos">+${bestPnl.toFixed(2)}</div>
          </div>
          <div className="sf-cell">
            <div className="sfl">Worst Trade</div>
            <div className={'sfv ' + (worstPnl < 0 ? 'neg' : '')}>${worstPnl.toFixed(2)}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── ACTIVITY FEED (15 visible, show more) ── */
function ActivityFeed({ decs }) {
  const [showAllDecs, setShowAllDecs] = useState(false);
  if (!decs || decs.length === 0) return null;
  const rev = [...decs].reverse();
  const VISIBLE = 15;
  const visible = showAllDecs ? rev : rev.slice(0, VISIBLE);
  const hidden = rev.length - VISIBLE;

  return (
    <div>
      <div className="sec-title"><h2>Recent Activity</h2><span className="cnt">{decs.length} signals</span></div>
      <div className="af">
        {visible.map((d, i) => {
          let bc = 'approved';
          if (d.decision === 'REJECTED') bc = 'rejected';
          else if (d.decision === 'EXIT') bc = 'exit';
          return (
            <div key={i} className="af-row">
              <span className="af-t">{d.time}</span>
              <span className={'af-b ' + bc}>{d.decision}</span>
              <span className="af-msg">{d.direction} — {d.reason}</span>
            </div>
          );
        })}
      </div>
      {!showAllDecs && hidden > 0 && (
        <div style={{textAlign:'center',padding:'10px 0'}}>
          <button onClick={() => setShowAllDecs(true)} style={{
            background:'var(--surface)',border:'1px solid var(--border)',
            borderRadius:'8px',padding:'8px 24px',cursor:'pointer',
            fontFamily:'var(--mono)',fontSize:'11px',fontWeight:'600',
            color:'var(--accent)',transition:'all .2s'
          }}>Show {hidden} more signals</button>
        </div>
      )}
      {showAllDecs && hidden > 0 && (
        <div style={{textAlign:'center',padding:'10px 0'}}>
          <button onClick={() => setShowAllDecs(false)} style={{
            background:'var(--surface)',border:'1px solid var(--border)',
            borderRadius:'8px',padding:'8px 24px',cursor:'pointer',
            fontFamily:'var(--mono)',fontSize:'11px',fontWeight:'600',
            color:'var(--text-muted)'
          }}>Show less</button>
        </div>
      )}
    </div>
  );
}

/* ── REFRESH STRIP ── */
function RefreshStrip({ countdown, error, updated }) {
  const pct = ((POLL_INTERVAL - countdown) / POLL_INTERVAL) * 100;
  let ts = '';
  if (updated) { try { ts = new Date(updated).toLocaleTimeString(); } catch(e){} }

  return (
    <div className="rstrip">
      <span>{error ? 'Connection error — retrying...' : 'Last: ' + ts}</span>
      <span>Next: {countdown}s <span className="rbar"><span className="rbar-fill" style={{width:pct+'%'}}></span></span></span>
    </div>
  );
}

/* ── UTILITY ── */
function fmt(n) {
  if (n == null) return '—';
  return n.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App />);
</script>
</body>
</html>

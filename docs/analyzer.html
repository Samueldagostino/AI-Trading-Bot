<script type="text/babel">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

// ═══════════════════════════════════════════════════════════════
// NQ FORENSIC TRADE VISUALIZER — Institutional-Grade Chart System
// Canvas-based OHLCV + Trade Overlay + Session Logic + Analytics
// ═══════════════════════════════════════════════════════════════

// ── THEME ──────────────────────────────────────────────────────
const T = {
  bg: "#FDFBF9", bgPanel: "#FFFFFF", bgCard: "#FAF7F4",
  bgHover: "#F5ECD7", bgActive: "#EDE5DA",
  border: "#E8DDD3", borderLight: "#F0EAE3",
  grid: "#F0EAE3", gridMajor: "#E8DDD3",
  text: "#8B7355", textMuted: "#B8A48E", textBright: "#5C4333",
  textWhite: "#3D2E22",
  green: "#2D8C4E", greenDim: "#2D8C4E80", greenBg: "#ECFAEF",
  red: "#C53D1B", redDim: "#C53D1B80", redBg: "#FDE8E2",
  blue: "#5B7BA8", blueDim: "#5B7BA820",
  amber: "#B08515", amberDim: "#B0851520",
  purple: "#8B6DB0", purpleDim: "#8B6DB020",
  cyan: "#4A9A8E",
  maintenanceShade: "#B085151F", maintenanceBorder: "#B0851540",
  crosshair: "#8B691450",
  selection: "#8B691420",
};

// ── DATA LOADING ──────────────────────────────────────────────
function loadVizData(jsonData) {
  const candles = (jsonData.candles || []).map(c => ({
    time: c.time, open: c.open, high: c.high, low: c.low,
    close: c.close, volume: c.volume || 0,
  }));
  const trades = (jsonData.trades || []).map((t, i) => ({
    id: t.id || i + 1,
    entryTime: t.entryTime, exitTime: t.exitTime,
    side: t.side || "long", qty: t.qty || 2,
    entryPrice: t.entryPrice || 0, exitPrice: t.exitPrice || 0,
    stopPrice: t.stopPrice || 0, tp1Price: t.tp1Price || 0, tp2Price: t.tp2Price || 0,
    stopDist: t.stopDist || 0, signalScore: t.signalScore || 0,
    regime: t.regime || "unknown", htfBias: t.htfBias || "neutral",
    exitType: t.exitType || "stop_loss", pnl: t.pnl || 0,
    c1Pnl: t.c1Pnl || 0, c2Pnl: t.c2Pnl || 0,
    slippage: t.slippage || 0, rMultiple: t.rMultiple || 0,
    mfe: t.mfe || 0, mae: t.mae || 0, holdBars: t.holdBars || 0,
    isCompliant: t.isCompliant !== undefined ? t.isCompliant : true,
  }));
  return { candles, trades };
}

// ── UTILITIES ─────────────────────────────────────────────────
function formatPrice(p) { return p.toFixed(2); }
function formatTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString("en-US", { hour: "2-digit", minute: "2-digit", hour12: false });
}
function formatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
}
function formatFull(ts) {
  const d = new Date(ts);
  return `${d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" })} ${formatTime(ts)}`;
}
function isMaintenance(ts) {
  const d = new Date(ts);
  const h = d.getHours(), m = d.getMinutes();
  return (h === 16 && m >= 30) || h === 17 || (h === 18 && m === 0);
}

// ── MAIN COMPONENT ────────────────────────────────────────────
function NQForensicVisualizer() {
  const [candles, setCandles] = useState([]);
  const [trades, setTrades] = useState([]);
  const [loading, setLoading] = useState(true);
  const [dataSource, setDataSource] = useState("");
  const [loadError, setLoadError] = useState(null);
  const [dragOver, setDragOver] = useState(false);
  const fileInputRef = useRef(null);
  const [viewStart, setViewStart] = useState(0);
  const [viewEnd, setViewEnd] = useState(200);
  const [selectedTrade, setSelectedTrade] = useState(null);
  const [crosshairPos, setCrosshairPos] = useState(null);
  const [hoveredCandle, setHoveredCandle] = useState(null);
  const [timeframe, setTimeframe] = useState("5m");
  const [filterRegime, setFilterRegime] = useState("all");
  const [filterSide, setFilterSide] = useState("all");
  const [filterExit, setFilterExit] = useState("all");
  const [filterMinScore, setFilterMinScore] = useState(0.75);
  const chartRef = useRef(null);
  const volRef = useRef(null);
  const containerRef = useRef(null);
  const isDragging = useRef(false);
  const dragStart = useRef(0);
  const dragViewStart = useRef(0);
  const [chartH, setChartH] = useState(480);
  const VOL_H = 60;
  const PRICE_AXIS_W = 85;
  const MIN_CANDLE_W = 3;
  const MAX_CANDLE_W = 24;
  const HEADER_H = 42;
  const STATS_H = 36;
  const NAV_H = 52;
  const DISCLOSURE_H = 36;

  // Dynamic chart height to fill viewport
  useEffect(() => {
    const calcHeight = () => {
      const available = window.innerHeight - NAV_H - HEADER_H - VOL_H - STATS_H - DISCLOSURE_H - 4;
      setChartH(Math.max(280, available));
    };
    calcHeight();
    window.addEventListener('resize', calcHeight);
    return () => window.removeEventListener('resize', calcHeight);
  }, []);

  const applyData = useCallback((jsonData, source) => {
    const { candles: c, trades: t } = loadVizData(jsonData);
    if (c.length === 0) { setLoadError("No candle data found in file"); setLoading(false); return false; }
    setCandles(c); setTrades(t);
    setViewStart(Math.max(0, c.length - 250));
    setViewEnd(c.length);
    setDataSource(source); setLoadError(null); setLoading(false); setSelectedTrade(null);
    return true;
  }, []);

  const handleFileUpload = useCallback((file) => {
    if (!file) return;
    if (file.size > 50 * 1024 * 1024) { setLoadError("File too large (max 50 MB)"); return; }
    setLoading(true); setLoadError(null);
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        applyData(data, `file:${file.name}`);
      } catch (err) {
        setLoadError(`Failed to parse ${file.name}: ${err.message}`);
        setLoading(false);
      }
    };
    reader.onerror = () => { setLoadError(`Failed to read ${file.name}`); setLoading(false); };
    reader.readAsText(file);
  }, [applyData]);

  const [isLiveData, setIsLiveData] = useState(false);
  const [lastUpdate, setLastUpdate] = useState(null);

  const trySample = useCallback(() => {
    fetch("sample_viz_data.json")
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        if (!applyData(data, "sample:Feb 23-27 2026")) throw new Error("no candles");
      })
      .catch(() => { setLoading(false); setLoadError(null); });
  }, [applyData]);

  const tryBacktest = useCallback(() => {
    fetch("viz_data.json")
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        const { candles: c } = loadVizData(data);
        if (c.length === 0) throw new Error("viz_data.json has 0 candles");
        applyData(data, "fetch:viz_data.json");
      })
      .catch(() => trySample());
  }, [applyData, trySample]);

  // Primary: Try live trade data first, then backtest, then sample
  useEffect(() => {
    fetch("data/trade_viz_data.json")
      .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
      .then(data => {
        const { candles: c, trades: t } = loadVizData(data);
        if (t.length === 0) throw new Error("no trades in live data");
        applyData(data, `live:${t.length} trades`);
        setIsLiveData(true);
        setLastUpdate(data.updated || new Date().toISOString());
      })
      .catch(() => tryBacktest());
  }, [applyData, tryBacktest]);

  // Auto-refresh live data every 60s
  useEffect(() => {
    if (!isLiveData) return;
    const interval = setInterval(() => {
      fetch("data/trade_viz_data.json")
        .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
        .then(data => {
          const { trades: t } = loadVizData(data);
          if (t.length > trades.length) {
            // New trades — refresh the data
            applyData(data, `live:${t.length} trades`);
            setLastUpdate(data.updated || new Date().toISOString());
          }
        })
        .catch(() => {});
    }, 60000);
    return () => clearInterval(interval);
  }, [isLiveData, trades.length, applyData]);

  useEffect(() => {
    const onDragOver = (e) => { e.preventDefault(); e.dataTransfer.dropEffect = "copy"; };
    const onDrop = (e) => {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file && file.name.endsWith(".json")) handleFileUpload(file);
    };
    document.addEventListener("dragover", onDragOver);
    document.addEventListener("drop", onDrop);
    return () => { document.removeEventListener("dragover", onDragOver); document.removeEventListener("drop", onDrop); };
  }, [handleFileUpload]);

  const filteredTrades = useMemo(() => {
    return trades.filter(t => {
      if (filterRegime !== "all" && t.regime !== filterRegime) return false;
      if (filterSide !== "all" && t.side !== filterSide) return false;
      if (filterExit !== "all" && t.exitType !== filterExit) return false;
      if (t.signalScore < filterMinScore) return false;
      return true;
    });
  }, [trades, filterRegime, filterSide, filterExit, filterMinScore]);

  const visibleCandles = useMemo(() => candles.slice(viewStart, viewEnd), [candles, viewStart, viewEnd]);

  const priceRange = useMemo(() => {
    if (visibleCandles.length === 0) return { min: 0, max: 1 };
    let min = Infinity, max = -Infinity;
    visibleCandles.forEach(c => { min = Math.min(min, c.low); max = Math.max(max, c.high); });
    if (selectedTrade) {
      min = Math.min(min, selectedTrade.stopPrice, selectedTrade.entryPrice);
      max = Math.max(max, selectedTrade.tp2Price, selectedTrade.entryPrice);
    }
    const pad = (max - min) * 0.08;
    return { min: min - pad, max: max + pad };
  }, [visibleCandles, selectedTrade]);

  const volRange = useMemo(() => {
    if (visibleCandles.length === 0) return { max: 1 };
    return { max: Math.max(...visibleCandles.map(c => c.volume)) };
  }, [visibleCandles]);

  const getChartWidth = useCallback(() => {
    if (!containerRef.current) return 800;
    return containerRef.current.offsetWidth - PRICE_AXIS_W;
  }, []);

  const priceToY = useCallback((price) => {
    const { min, max } = priceRange;
    return chartH - ((price - min) / (max - min)) * chartH;
  }, [priceRange, chartH]);

  const xToIndex = useCallback((x) => {
    const w = getChartWidth();
    const count = viewEnd - viewStart;
    return Math.floor((x / w) * count) + viewStart;
  }, [viewStart, viewEnd, getChartWidth]);

  // ── RENDER CHART — Premium Institutional-Grade ──────────
  useEffect(() => {
    const canvas = chartRef.current;
    const volCanvas = volRef.current;
    if (!canvas || !volCanvas || visibleCandles.length === 0) return;
    const w = getChartWidth() + PRICE_AXIS_W;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = w * dpr; canvas.height = chartH * dpr;
    canvas.style.width = w + "px"; canvas.style.height = chartH + "px";
    const ctx = canvas.getContext("2d"); ctx.scale(dpr, dpr);
    volCanvas.width = w * dpr; volCanvas.height = VOL_H * dpr;
    volCanvas.style.width = w + "px"; volCanvas.style.height = VOL_H + "px";
    const vctx = volCanvas.getContext("2d"); vctx.scale(dpr, dpr);
    const chartW = w - PRICE_AXIS_W;
    const count = visibleCandles.length;
    const candleW = Math.max(MIN_CANDLE_W, Math.min(MAX_CANDLE_W, chartW / count - 1));
    const bodyW = Math.max(1, candleW - 2);

    // ── Premium gradient background ──
    const bgGrad = ctx.createLinearGradient(0, 0, 0, chartH);
    bgGrad.addColorStop(0, '#FAF7F2');
    bgGrad.addColorStop(1, '#F3EDE4');
    ctx.fillStyle = bgGrad; ctx.fillRect(0, 0, w, chartH);
    const volBg = vctx.createLinearGradient(0, 0, 0, VOL_H);
    volBg.addColorStop(0, '#F5F0EA');
    volBg.addColorStop(1, '#F0EAE0');
    vctx.fillStyle = volBg; vctx.fillRect(0, 0, w, VOL_H);

    // ── Smart grid with nice-number algorithm ──
    const { min: pMin, max: pMax } = priceRange;
    const pRange = pMax - pMin;
    let niceStep = pRange / 6;
    const mag = Math.pow(10, Math.floor(Math.log10(niceStep)));
    const residual = niceStep / mag;
    if (residual <= 1.5) niceStep = 1 * mag;
    else if (residual <= 3.5) niceStep = 2.5 * mag;
    else if (residual <= 7.5) niceStep = 5 * mag;
    else niceStep = 10 * mag;
    niceStep = Math.max(niceStep, 0.25);
    const gridStart = Math.ceil(pMin / niceStep) * niceStep;

    ctx.textAlign = "right"; ctx.textBaseline = "middle";
    for (let p = gridStart; p <= pMax; p += niceStep) {
      const y = priceToY(p);
      if (y < 4 || y > chartH - 4) continue;
      ctx.strokeStyle = "rgba(200, 188, 172, 0.35)";
      ctx.lineWidth = 0.5; ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(chartW, y); ctx.stroke();
      ctx.fillStyle = "#A89070";
      ctx.font = "500 10px 'JetBrains Mono', 'SF Mono', monospace";
      ctx.fillText(formatPrice(p), w - 8, y);
    }

    // ── Right axis line ──
    ctx.strokeStyle = "rgba(200, 188, 172, 0.5)"; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(chartW, 0); ctx.lineTo(chartW, chartH); ctx.stroke();
    vctx.strokeStyle = "rgba(200, 188, 172, 0.5)"; vctx.lineWidth = 1;
    vctx.beginPath(); vctx.moveTo(chartW, 0); vctx.lineTo(chartW, VOL_H); vctx.stroke();

    // Maintenance shading
    visibleCandles.forEach((c, i) => {
      if (isMaintenance(c.time)) {
        const x = (i / count) * chartW;
        ctx.fillStyle = T.maintenanceShade; ctx.fillRect(x, 0, candleW + 1, chartH);
        ctx.strokeStyle = T.maintenanceBorder; ctx.lineWidth = 0.5; ctx.strokeRect(x, 0, candleW + 1, chartH);
      }
    });
    // Day separators
    let lastDay = -1;
    visibleCandles.forEach((c, i) => {
      const d = new Date(c.time); const day = d.getDate();
      if (day !== lastDay && lastDay !== -1) {
        const x = (i / count) * chartW;
        ctx.strokeStyle = T.gridMajor; ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, chartH); ctx.stroke();
        ctx.fillStyle = T.textMuted; ctx.font = "10px 'JetBrains Mono', monospace";
        ctx.textAlign = "center"; ctx.fillText(formatDate(c.time), x, chartH - 4);
      }
      lastDay = day;
    });

    // Selected trade overlay
    if (selectedTrade) {
      const st = selectedTrade;
      const entryIdx = candles.findIndex(c => c.time >= st.entryTime);
      const exitIdx = candles.findIndex(c => c.time >= st.exitTime);
      if (entryIdx >= viewStart && entryIdx < viewEnd) {
        const eX = ((entryIdx - viewStart) / count) * chartW;
        const xX = exitIdx >= viewStart ? ((exitIdx - viewStart) / count) * chartW : chartW;

        // Stop level with background pill
        const stopY = priceToY(st.stopPrice);
        ctx.strokeStyle = T.red; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
        ctx.beginPath(); ctx.moveTo(eX, stopY); ctx.lineTo(xX, stopY); ctx.stroke(); ctx.setLineDash([]);
        const stopLabel = `STOP ${formatPrice(st.stopPrice)}`;
        ctx.font = "bold 9px 'JetBrains Mono', monospace"; ctx.textAlign = "left";
        const stopLW = ctx.measureText(stopLabel).width + 10;
        ctx.fillStyle = "rgba(253,232,226,0.92)";
        if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(eX, stopY - 9, stopLW, 16, 3); ctx.fill(); }
        else { ctx.fillRect(eX, stopY - 9, stopLW, 16); }
        ctx.fillStyle = T.red; ctx.fillText(stopLabel, eX + 4, stopY + 3);

        // Risk zone shading
        const entryY = priceToY(st.entryPrice);
        const riskTop = Math.min(entryY, stopY), riskBot = Math.max(entryY, stopY);
        ctx.fillStyle = "rgba(197,61,27,0.04)";
        ctx.fillRect(eX, riskTop, xX - eX, riskBot - riskTop);

        // PT1 level with pill
        const tp1Y = priceToY(st.tp1Price);
        ctx.strokeStyle = T.blue; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
        ctx.beginPath(); ctx.moveTo(eX, tp1Y); ctx.lineTo(xX, tp1Y); ctx.stroke(); ctx.setLineDash([]);
        const pt1Label = `PT1 ${formatPrice(st.tp1Price)}`;
        const pt1LW = ctx.measureText(pt1Label).width + 10;
        ctx.fillStyle = "rgba(239,246,255,0.92)";
        if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(eX, tp1Y - 9, pt1LW, 16, 3); ctx.fill(); }
        else { ctx.fillRect(eX, tp1Y - 9, pt1LW, 16); }
        ctx.fillStyle = T.blue; ctx.fillText(pt1Label, eX + 4, tp1Y + 3);

        // PT2 level with pill
        const tp2Y = priceToY(st.tp2Price);
        ctx.strokeStyle = T.purple; ctx.lineWidth = 1; ctx.setLineDash([4, 3]);
        ctx.beginPath(); ctx.moveTo(eX, tp2Y); ctx.lineTo(xX, tp2Y); ctx.stroke(); ctx.setLineDash([]);
        const pt2Label = `PT2 ${formatPrice(st.tp2Price)}`;
        const pt2LW = ctx.measureText(pt2Label).width + 10;
        ctx.fillStyle = "rgba(232,225,243,0.92)";
        if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(eX, tp2Y - 9, pt2LW, 16, 3); ctx.fill(); }
        else { ctx.fillRect(eX, tp2Y - 9, pt2LW, 16); }
        ctx.fillStyle = T.purple; ctx.fillText(pt2Label, eX + 4, tp2Y + 3);

        // Reward zone shading
        const rwTop = Math.min(entryY, tp1Y), rwBot = Math.max(entryY, tp1Y);
        ctx.fillStyle = "rgba(45,140,78,0.03)";
        ctx.fillRect(eX, rwTop, xX - eX, rwBot - rwTop);

        // Entry line
        ctx.strokeStyle = T.textBright; ctx.lineWidth = 1.5; ctx.setLineDash([2, 2]);
        ctx.beginPath(); ctx.moveTo(eX, entryY); ctx.lineTo(xX, entryY); ctx.stroke(); ctx.setLineDash([]);

        // P&L trajectory line
        const exitY = priceToY(st.exitPrice);
        ctx.strokeStyle = st.pnl >= 0 ? T.green : T.red; ctx.lineWidth = 2.5; ctx.globalAlpha = 0.85;
        ctx.beginPath(); ctx.moveTo(eX, entryY); ctx.lineTo(xX, exitY); ctx.stroke(); ctx.globalAlpha = 1;
        const topY = Math.min(entryY, exitY), botY = Math.max(entryY, exitY);
        ctx.fillStyle = st.pnl >= 0 ? "rgba(45,140,78,0.2)" : "rgba(197,61,27,0.2)";
        ctx.fillRect(eX, topY, xX - eX, botY - topY);

        // Entry arrow
        ctx.fillStyle = st.side === "long" ? T.green : T.red;
        ctx.beginPath();
        if (st.side === "long") { ctx.moveTo(eX, entryY + 8); ctx.lineTo(eX - 8, entryY + 20); ctx.lineTo(eX + 8, entryY + 20); }
        else { ctx.moveTo(eX, entryY - 8); ctx.lineTo(eX - 8, entryY - 20); ctx.lineTo(eX + 8, entryY - 20); }
        ctx.fill(); ctx.strokeStyle = "#FFFFFF"; ctx.lineWidth = 1.5; ctx.stroke();

        // Exit circle
        ctx.fillStyle = st.pnl >= 0 ? T.green : T.red;
        ctx.beginPath(); ctx.arc(xX, exitY, 7, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "#FFFFFF"; ctx.lineWidth = 1.5; ctx.stroke();
        ctx.fillStyle = "#FAF7F2"; ctx.beginPath(); ctx.arc(xX, exitY, 3, 0, Math.PI * 2); ctx.fill();

        // Summary label pill
        const labelX = eX + (xX - eX) / 2;
        const labelY = st.side === "long" ? Math.min(tp1Y, entryY) - 20 : Math.max(stopY, entryY) + 30;
        const labelText = `${st.rMultiple > 0 ? "+" : ""}${st.rMultiple}R  $${st.pnl > 0 ? "+" : ""}${st.pnl.toFixed(0)}  ${st.exitType.replace(/_/g, " ").toUpperCase()}`;
        ctx.font = "bold 9px 'JetBrains Mono', monospace";
        const lw = ctx.measureText(labelText).width + 14;
        const lx = labelX - lw / 2, ly = labelY - 9, lh = 20;
        ctx.fillStyle = st.pnl >= 0 ? "rgba(10,42,26,0.95)" : "rgba(42,10,14,0.95)";
        ctx.strokeStyle = st.pnl >= 0 ? T.green : T.red; ctx.lineWidth = 1;
        if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(lx, ly, lw, lh, 5); ctx.fill(); ctx.stroke(); }
        else { ctx.fillRect(lx, ly, lw, lh); ctx.strokeRect(lx, ly, lw, lh); }
        ctx.fillStyle = st.pnl >= 0 ? T.green : T.red;
        ctx.textAlign = "center"; ctx.fillText(labelText, labelX, labelY + 4);
      }
    }

    // ── Candles — premium rendering ──
    visibleCandles.forEach((c, i) => {
      const x = (i / count) * chartW + (chartW / count - bodyW) / 2;
      const xCenter = (i / count) * chartW + (chartW / count) / 2;
      const isGreen = c.close >= c.open;
      const color = isGreen ? T.green : T.red;
      const oY = priceToY(c.open), cY = priceToY(c.close);
      const hY = priceToY(c.high), lY = priceToY(c.low);

      // Wick
      ctx.strokeStyle = color; ctx.lineWidth = bodyW >= 8 ? 1.5 : 1;
      ctx.beginPath(); ctx.moveTo(xCenter, hY); ctx.lineTo(xCenter, lY); ctx.stroke();

      // Body — solid with subtle opacity
      const bodyTop = Math.min(oY, cY), bodyHeight = Math.max(1, Math.abs(oY - cY));
      ctx.fillStyle = color; ctx.globalAlpha = 0.92;
      if (bodyW >= 6 && ctx.roundRect) {
        ctx.beginPath(); ctx.roundRect(x, bodyTop, bodyW, bodyHeight, Math.min(2, bodyW / 4)); ctx.fill();
      } else {
        ctx.fillRect(x, bodyTop, bodyW, bodyHeight);
      }
      ctx.globalAlpha = 1.0;

      // Volume bars with gradient
      const vH = (c.volume / volRange.max) * (VOL_H - 8);
      const vBarW = Math.max(2, bodyW - 1);
      const volGrad = vctx.createLinearGradient(0, VOL_H - vH, 0, VOL_H);
      if (isGreen) {
        volGrad.addColorStop(0, "rgba(45,140,78,0.55)");
        volGrad.addColorStop(1, "rgba(45,140,78,0.18)");
      } else {
        volGrad.addColorStop(0, "rgba(197,61,27,0.55)");
        volGrad.addColorStop(1, "rgba(197,61,27,0.18)");
      }
      vctx.fillStyle = volGrad;
      if (vBarW >= 4 && vctx.roundRect) {
        vctx.beginPath(); vctx.roundRect(x, VOL_H - vH, vBarW, vH, [2, 2, 0, 0]); vctx.fill();
      } else {
        vctx.fillRect(x, VOL_H - vH, vBarW, vH);
      }
    });

    // ── Last price line with tag ──
    if (visibleCandles.length > 0) {
      const lastC = visibleCandles[visibleCandles.length - 1];
      const lastY = priceToY(lastC.close);
      const lastIsUp = lastC.close >= lastC.open;
      ctx.setLineDash([2, 3]);
      ctx.strokeStyle = lastIsUp ? "rgba(45,140,78,0.4)" : "rgba(197,61,27,0.4)";
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(0, lastY); ctx.lineTo(chartW, lastY); ctx.stroke();
      ctx.setLineDash([]);
      // Price tag on right axis
      const tagW = 68, tagH = 20, tagX = chartW + 3, tagY = lastY - tagH / 2;
      ctx.fillStyle = lastIsUp ? T.green : T.red;
      if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(tagX, tagY, tagW, tagH, 3); ctx.fill(); }
      else { ctx.fillRect(tagX, tagY, tagW, tagH); }
      ctx.fillStyle = "#FFFFFF";
      ctx.font = "bold 10px 'JetBrains Mono', monospace";
      ctx.textAlign = "center"; ctx.fillText(formatPrice(lastC.close), tagX + tagW / 2, lastY + 3.5);
    }

    // Non-selected trade markers
    filteredTrades.forEach(t => {
      if (selectedTrade && t.id === selectedTrade.id) return;
      const entryIdx = candles.findIndex(c => c.time >= t.entryTime);
      if (entryIdx < viewStart || entryIdx >= viewEnd) return;
      const x = ((entryIdx - viewStart) / count) * chartW + (chartW / count) / 2;
      const y = priceToY(t.entryPrice);
      ctx.fillStyle = t.pnl >= 0 ? T.green : T.red; ctx.globalAlpha = 0.9;
      if (t.side === "long") {
        ctx.beginPath(); ctx.moveTo(x, y + 5); ctx.lineTo(x - 5, y + 13); ctx.lineTo(x + 5, y + 13); ctx.fill();
        ctx.strokeStyle = "#FFFFFF"; ctx.lineWidth = 1; ctx.stroke();
      } else {
        ctx.beginPath(); ctx.moveTo(x, y - 5); ctx.lineTo(x - 5, y - 13); ctx.lineTo(x + 5, y - 13); ctx.fill();
        ctx.strokeStyle = "#FFFFFF"; ctx.lineWidth = 1; ctx.stroke();
      }
      ctx.globalAlpha = 1;
    });

    // ── Crosshair — dashed lines ──
    if (crosshairPos) {
      const { x, y } = crosshairPos;
      ctx.strokeStyle = "rgba(139,105,20,0.3)"; ctx.lineWidth = 0.5; ctx.setLineDash([4, 4]);
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, chartH); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(chartW, y); ctx.stroke(); ctx.setLineDash([]);
      const price = pMin + ((chartH - y) / chartH) * pRange;
      // Price label on axis
      ctx.fillStyle = T.textBright;
      if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(chartW + 2, y - 10, PRICE_AXIS_W - 4, 20, 3); }
      ctx.fillStyle = "#3D2E22";
      if (ctx.roundRect) { ctx.beginPath(); ctx.roundRect(chartW + 2, y - 10, PRICE_AXIS_W - 4, 20, 3); ctx.fill(); }
      else { ctx.fillRect(chartW + 2, y - 10, PRICE_AXIS_W - 4, 20); }
      ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 10px 'JetBrains Mono', monospace"; ctx.textAlign = "right";
      ctx.fillText(formatPrice(price), w - 10, y + 3.5);
    }

    // ── Watermark ──
    ctx.save();
    ctx.font = "600 10px 'JetBrains Mono', monospace";
    ctx.fillStyle = "rgba(139,105,20,0.1)";
    ctx.textAlign = "right";
    ctx.fillText("MNQ FORENSIC ANALYZER", chartW - 8, 18);
    ctx.restore();

  }, [visibleCandles, priceRange, volRange, selectedTrade, filteredTrades, crosshairPos, candles, viewStart, viewEnd, priceToY, getChartWidth, chartH]);

  // Mouse handlers
  const handleMouseMove = useCallback((e) => {
    const rect = chartRef.current?.getBoundingClientRect();
    if (!rect) return;
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    const chartW = getChartWidth();
    if (x > chartW) { setCrosshairPos(null); setHoveredCandle(null); return; }
    setCrosshairPos({ x, y });
    const idx = xToIndex(x);
    if (idx >= 0 && idx < candles.length) setHoveredCandle(candles[idx]);
    if (isDragging.current) {
      const dx = e.clientX - dragStart.current;
      const pixelsPerCandle = chartW / (viewEnd - viewStart);
      const shift = Math.round(-dx / pixelsPerCandle);
      const newStart = Math.max(0, Math.min(candles.length - 50, dragViewStart.current + shift));
      const range = viewEnd - viewStart;
      setViewStart(newStart); setViewEnd(Math.min(candles.length, newStart + range));
    }
  }, [candles, viewStart, viewEnd, getChartWidth, xToIndex]);

  const handleMouseDown = useCallback((e) => {
    isDragging.current = true; dragStart.current = e.clientX; dragViewStart.current = viewStart; e.preventDefault();
  }, [viewStart]);
  const handleMouseUp = useCallback(() => { isDragging.current = false; }, []);
  const handleMouseLeave = useCallback(() => { setCrosshairPos(null); setHoveredCandle(null); isDragging.current = false; }, []);

  const handleWheel = useCallback((e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 1.1 : 0.9;
    const range = viewEnd - viewStart;
    const newRange = Math.max(30, Math.min(candles.length, Math.round(range * delta)));
    const chartW = getChartWidth();
    const rect = chartRef.current?.getBoundingClientRect();
    const mouseX = rect ? (e.clientX - rect.left) / chartW : 0.5;
    const center = viewStart + range * mouseX;
    const newStart = Math.max(0, Math.round(center - newRange * mouseX));
    const newEnd = Math.min(candles.length, newStart + newRange);
    setViewStart(newStart); setViewEnd(newEnd);
  }, [candles, viewStart, viewEnd, getChartWidth]);

  const focusTrade = useCallback((trade) => {
    setSelectedTrade(trade);
    const entryIdx = candles.findIndex(c => c.time >= trade.entryTime);
    const exitIdx = candles.findIndex(c => c.time >= trade.exitTime);
    const pad = 30;
    setViewStart(Math.max(0, entryIdx - pad));
    setViewEnd(Math.min(candles.length, exitIdx + pad));
  }, [candles]);

  const stats = useMemo(() => {
    const ft = filteredTrades;
    if (ft.length === 0) return null;
    const wins = ft.filter(t => t.pnl > 0);
    const losses = ft.filter(t => t.pnl <= 0);
    const totalPnl = ft.reduce((s, t) => s + t.pnl, 0);
    const grossWin = wins.reduce((s, t) => s + t.pnl, 0);
    const grossLoss = Math.abs(losses.reduce((s, t) => s + t.pnl, 0));
    return {
      count: ft.length,
      winRate: ((wins.length / ft.length) * 100).toFixed(1),
      pf: grossLoss > 0 ? (grossWin / grossLoss).toFixed(2) : "\u221E",
      totalPnl: totalPnl.toFixed(2),
      avgPnl: (totalPnl / ft.length).toFixed(2),
      avgWin: wins.length > 0 ? (grossWin / wins.length).toFixed(2) : "0",
      avgLoss: losses.length > 0 ? (grossLoss / losses.length).toFixed(2) : "0",
    };
  }, [filteredTrades]);

  if (loading) {
    return (
      <div style={{ background: T.bg, color: T.text, height: "calc(100vh - 52px)", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'SF Mono', monospace", flexDirection: "column", gap: 12 }}>
        <div style={{ width: 24, height: 24, border: `2px solid ${T.border}`, borderTopColor: T.blue, borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
        <div style={{ color: T.textMuted, fontSize: 11 }}>Loading data...</div>
        <style>{`@keyframes spin { to { transform: rotate(360deg) } }`}</style>
      </div>
    );
  }

  // No data — professional upload prompt with drop zone
  if (candles.length === 0) {
    return (
      <div style={{ background: T.bg, color: T.text, height: "calc(100vh - 52px)", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'SF Mono', 'Cascadia Code', 'JetBrains Mono', monospace" }}>
        <div style={{ textAlign: "center", maxWidth: 520, padding: "0 24px" }}>
          <div style={{ fontSize: 20, fontWeight: 700, color: T.textWhite, letterSpacing: 2, marginBottom: 6 }}>NQ FORENSIC ANALYZER</div>
          <div style={{ color: T.textMuted, fontSize: 11, marginBottom: 32, letterSpacing: 0.5 }}>Canvas OHLCV &middot; Trade Overlays &middot; Regime Filtering &middot; Per-Trade Compliance</div>

          <div
            onDragOver={e => { e.preventDefault(); setDragOver(true); }}
            onDragLeave={() => setDragOver(false)}
            onDrop={e => { e.preventDefault(); setDragOver(false); const f = e.dataTransfer.files[0]; if (f && f.name.endsWith('.json')) handleFileUpload(f); }}
            onClick={() => fileInputRef.current?.click()}
            style={{
              border: `2px dashed ${dragOver ? T.blue : T.borderLight}`,
              borderRadius: 12,
              padding: "48px 32px",
              cursor: "pointer",
              transition: "border-color 0.2s, background 0.2s",
              background: dragOver ? T.blueDim : "transparent",
              marginBottom: 24,
            }}
          >
            <div style={{ fontSize: 32, marginBottom: 12, opacity: 0.6 }}>{dragOver ? "\u2B07" : "\u{1F4CA}"}</div>
            <div style={{ fontSize: 13, color: T.textBright, fontWeight: 600, marginBottom: 8 }}>
              Drop <span style={{ color: T.blue }}>viz_data.json</span> here or click to upload
            </div>
            <div style={{ fontSize: 11, color: T.textMuted, lineHeight: 1.7, maxWidth: 380, margin: "0 auto" }}>
              Load your backtest output to visualize trades on OHLCV charts with full filtering and analysis
            </div>
          </div>

          <input ref={fileInputRef} type="file" accept=".json" style={{ display: "none" }}
            onChange={e => { handleFileUpload(e.target.files[0]); e.target.value = ""; }} />

          {loadError && <div style={{ color: T.red, fontSize: 11, marginBottom: 16 }}>{loadError}</div>}

          <div style={{ color: T.textMuted, fontSize: 10, lineHeight: 1.8 }}>
            <span style={{ color: T.text }}>Generate with:</span> <span style={{ color: T.textBright }}>python -m dashboard.data_adapter --backtest-json backtest_viz_data.json</span>
          </div>
        </div>
      </div>
    );
  }

  const exitColor = (type) => {
    const m = { pt1_partial: T.blue, pt2_target: T.purple, trailing_stop: T.green, stop_loss: T.red, be_plus: T.amber };
    return m[type] || T.text;
  };
  const regimeColor = (r) => {
    const m = { trending_up: T.green, trending_down: T.red, ranging: T.amber, unknown: T.textMuted };
    return m[r] || T.text;
  };

  return (
    <div style={{ background: T.bg, color: T.text, height: `calc(100vh - ${NAV_H}px)`, fontFamily: "'SF Mono', 'Cascadia Code', 'JetBrains Mono', 'Fira Code', monospace", fontSize: 12, overflow: "hidden", display: "flex", flexDirection: "column" }}>
      {/* HEADER BAR */}
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "8px 16px", borderBottom: `1px solid ${T.border}`, background: T.bgPanel, flexShrink: 0, height: HEADER_H }}>
        <div style={{ display: "flex", alignItems: "center", gap: 16 }}>
          <span style={{ fontSize: 14, fontWeight: 700, color: T.textWhite, letterSpacing: 1 }}>NQ FORENSIC</span>
          {isLiveData && (
            <span style={{ background: "linear-gradient(135deg, #2D8C4E, #3fb950)", color: "#fff", padding: "2px 8px", borderRadius: 4, fontSize: 9, fontWeight: 700, letterSpacing: 1.5, animation: "livePulse 2s ease-in-out infinite" }}>LIVE</span>
          )}
          <span style={{ color: T.textMuted, fontSize: 10, letterSpacing: 2 }}>MNQ &middot; $2/pt &middot; 2-LOT SCALE-OUT</span>
          <div style={{ display: "flex", gap: 2 }}>
            {["1m", "5m", "15m"].map(tf => (
              <button key={tf} onClick={() => setTimeframe(tf)} style={{
                background: timeframe === tf ? T.bgActive : "transparent", color: timeframe === tf ? T.textBright : T.textMuted,
                border: `1px solid ${timeframe === tf ? T.borderLight : "transparent"}`, padding: "2px 8px", borderRadius: 3, cursor: "pointer", fontSize: 10,
              }}>{tf}</button>
            ))}
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <input ref={fileInputRef} type="file" accept=".json" style={{ display: "none" }}
              onChange={e => { handleFileUpload(e.target.files[0]); e.target.value = ""; }} />
            <button onClick={() => fileInputRef.current?.click()} style={{
              background: "transparent", color: T.textMuted, border: `1px solid ${T.border}`,
              padding: "2px 8px", borderRadius: 3, cursor: "pointer", fontSize: 9,
            }}>LOAD JSON</button>
            {dataSource && <span style={{ color: T.textMuted, fontSize: 8 }}>{dataSource}</span>}
          </div>
        </div>
        {hoveredCandle && (
          <div style={{ display: "flex", gap: 16, fontSize: 11 }}>
            <span style={{ color: T.textMuted }}>{formatFull(hoveredCandle.time)}</span>
            <span>O <span style={{ color: T.textBright }}>{formatPrice(hoveredCandle.open)}</span></span>
            <span>H <span style={{ color: T.green }}>{formatPrice(hoveredCandle.high)}</span></span>
            <span>L <span style={{ color: T.red }}>{formatPrice(hoveredCandle.low)}</span></span>
            <span>C <span style={{ color: hoveredCandle.close >= hoveredCandle.open ? T.green : T.red }}>{formatPrice(hoveredCandle.close)}</span></span>
            <span>Vol <span style={{ color: T.textBright }}>{hoveredCandle.volume.toLocaleString()}</span></span>
          </div>
        )}
      </div>
      <div style={{ display: "flex", flex: 1, overflow: "hidden" }}>
        {/* CHART AREA */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }} ref={containerRef}>
          <div style={{ position: "relative", cursor: isDragging.current ? "grabbing" : "crosshair" }}
            onMouseMove={handleMouseMove} onMouseDown={handleMouseDown}
            onMouseUp={handleMouseUp} onMouseLeave={handleMouseLeave}
            onWheel={handleWheel}>
            <canvas ref={chartRef} style={{ display: "block" }} />
          </div>
          <div style={{ borderTop: `1px solid ${T.border}` }}>
            <canvas ref={volRef} style={{ display: "block" }} />
          </div>
          {stats && (
            <div style={{ display: "flex", gap: 1, padding: 0, borderTop: `1px solid ${T.border}`, background: T.bgPanel }}>
              {[
                { label: "TRADES", value: stats.count, color: T.textBright },
                { label: "WIN%", value: `${stats.winRate}%`, color: parseFloat(stats.winRate) > 55 ? T.green : T.amber },
                { label: "PF", value: stats.pf, color: parseFloat(stats.pf) > 2 ? T.green : parseFloat(stats.pf) > 1.5 ? T.amber : T.red },
                { label: "TOTAL", value: `$${parseFloat(stats.totalPnl) >= 0 ? "+" : ""}${stats.totalPnl}`, color: parseFloat(stats.totalPnl) >= 0 ? T.green : T.red },
                { label: "AVG", value: `$${stats.avgPnl}`, color: parseFloat(stats.avgPnl) >= 0 ? T.green : T.red },
                { label: "AVG W", value: `$${stats.avgWin}`, color: T.green },
                { label: "AVG L", value: `-$${stats.avgLoss}`, color: T.red },
              ].map((s, i) => (
                <div key={i} style={{ flex: 1, padding: "6px 10px", background: T.bgCard, textAlign: "center" }}>
                  <div style={{ fontSize: 9, color: T.textMuted, letterSpacing: 1, marginBottom: 2 }}>{s.label}</div>
                  <div style={{ fontSize: 13, fontWeight: 600, color: s.color }}>{s.value}</div>
                </div>
              ))}
            </div>
          )}
        </div>
        {/* SIDEBAR */}
        <div style={{ width: 340, borderLeft: `1px solid ${T.border}`, display: "flex", flexDirection: "column", background: T.bgPanel }}>
          <div style={{ padding: "10px 12px", borderBottom: `1px solid ${T.border}` }}>
            <div style={{ fontSize: 9, color: T.textMuted, letterSpacing: 2, marginBottom: 8 }}>FILTERS</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              <select value={filterRegime} onChange={e => setFilterRegime(e.target.value)}
                style={{ background: T.bgCard, color: T.textBright, border: `1px solid ${T.border}`, borderRadius: 3, padding: "3px 6px", fontSize: 10, flex: 1, minWidth: 80 }}>
                <option value="all">All Regimes</option>
                <option value="trending_up">Trend Up</option>
                <option value="trending_down">Trend Down</option>
                <option value="ranging">Ranging</option>
                <option value="unknown">Unknown</option>
              </select>
              <select value={filterSide} onChange={e => setFilterSide(e.target.value)}
                style={{ background: T.bgCard, color: T.textBright, border: `1px solid ${T.border}`, borderRadius: 3, padding: "3px 6px", fontSize: 10, flex: 1, minWidth: 60 }}>
                <option value="all">Both</option>
                <option value="long">Long</option>
                <option value="short">Short</option>
              </select>
              <select value={filterExit} onChange={e => setFilterExit(e.target.value)}
                style={{ background: T.bgCard, color: T.textBright, border: `1px solid ${T.border}`, borderRadius: 3, padding: "3px 6px", fontSize: 10, flex: 1, minWidth: 80 }}>
                <option value="all">All Exits</option>
                <option value="pt1_partial">PT1 Partial</option>
                <option value="pt2_target">PT2 Target</option>
                <option value="trailing_stop">Trailing</option>
                <option value="stop_loss">Stop Loss</option>
                <option value="be_plus">BE+</option>
              </select>
            </div>
            <div style={{ marginTop: 6, display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 10, color: T.textMuted }}>Score &ge;</span>
              <input type="range" min="0.70" max="0.98" step="0.01" value={filterMinScore}
                onChange={e => setFilterMinScore(parseFloat(e.target.value))}
                style={{ flex: 1, accentColor: T.blue }} />
              <span style={{ fontSize: 11, color: T.textBright, fontWeight: 600, minWidth: 36 }}>{filterMinScore.toFixed(2)}</span>
            </div>
          </div>
          {selectedTrade && (
            <div style={{ padding: "10px 12px", borderBottom: `1px solid ${T.border}`, background: T.bgCard }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 6 }}>
                <span style={{ fontSize: 10, fontWeight: 700, color: T.textWhite, letterSpacing: 1 }}>TRADE #{selectedTrade.id}</span>
                <button onClick={() => setSelectedTrade(null)} style={{ background: "transparent", border: "none", color: T.textMuted, cursor: "pointer", fontSize: 12 }}>&times;</button>
              </div>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "4px 12px", fontSize: 10 }}>
                <div><span style={{ color: T.textMuted }}>Side</span> <span style={{ color: selectedTrade.side === "long" ? T.green : T.red, fontWeight: 600 }}>{selectedTrade.side.toUpperCase()}</span></div>
                <div><span style={{ color: T.textMuted }}>Score</span> <span style={{ color: T.blue, fontWeight: 600 }}>{selectedTrade.signalScore.toFixed(3)}</span></div>
                <div><span style={{ color: T.textMuted }}>Entry</span> <span style={{ color: T.textBright }}>{formatPrice(selectedTrade.entryPrice)}</span></div>
                <div><span style={{ color: T.textMuted }}>Exit</span> <span style={{ color: T.textBright }}>{formatPrice(selectedTrade.exitPrice)}</span></div>
                <div><span style={{ color: T.textMuted }}>Stop</span> <span style={{ color: T.red }}>{formatPrice(selectedTrade.stopPrice)} ({selectedTrade.stopDist.toFixed(1)}pt)</span></div>
                <div><span style={{ color: T.textMuted }}>R:R</span> <span style={{ color: selectedTrade.rMultiple > 0 ? T.green : T.red, fontWeight: 600 }}>{selectedTrade.rMultiple > 0 ? "+" : ""}{selectedTrade.rMultiple}R</span></div>
                <div><span style={{ color: T.textMuted }}>PnL</span> <span style={{ color: selectedTrade.pnl >= 0 ? T.green : T.red, fontWeight: 700 }}>${selectedTrade.pnl >= 0 ? "+" : ""}{selectedTrade.pnl.toFixed(2)}</span></div>
                <div><span style={{ color: T.textMuted }}>Slip</span> <span style={{ color: T.amber }}>${selectedTrade.slippage.toFixed(2)}</span></div>
                <div><span style={{ color: T.textMuted }}>C1</span> <span style={{ color: selectedTrade.c1Pnl >= 0 ? T.green : T.red }}>${selectedTrade.c1Pnl.toFixed(2)}</span></div>
                <div><span style={{ color: T.textMuted }}>C2</span> <span style={{ color: selectedTrade.c2Pnl >= 0 ? T.green : T.red }}>${selectedTrade.c2Pnl.toFixed(2)}</span></div>
                <div><span style={{ color: T.textMuted }}>MFE</span> <span style={{ color: T.green }}>{selectedTrade.mfe.toFixed(1)}pt</span></div>
                <div><span style={{ color: T.textMuted }}>MAE</span> <span style={{ color: T.red }}>{selectedTrade.mae.toFixed(1)}pt</span></div>
                <div><span style={{ color: T.textMuted }}>Regime</span> <span style={{ color: regimeColor(selectedTrade.regime) }}>{selectedTrade.regime}</span></div>
                <div><span style={{ color: T.textMuted }}>HTF</span> <span style={{ color: T.textBright }}>{selectedTrade.htfBias}</span></div>
                <div style={{ gridColumn: "1 / -1" }}><span style={{ color: T.textMuted }}>Exit</span> <span style={{ color: exitColor(selectedTrade.exitType), fontWeight: 600 }}>{selectedTrade.exitType.replace(/_/g, " ").toUpperCase()}</span></div>
                <div style={{ gridColumn: "1 / -1" }}><span style={{ color: T.textMuted }}>Hold</span> <span style={{ color: T.textBright }}>{selectedTrade.holdBars} bars</span> <span style={{ color: T.textMuted, marginLeft: 8 }}>{formatFull(selectedTrade.entryTime)}</span></div>
                <div style={{ gridColumn: "1 / -1", display: "flex", alignItems: "center", gap: 4, marginTop: 2 }}>
                  <span style={{ color: T.textMuted }}>Compliance</span>
                  <span style={{ background: selectedTrade.isCompliant ? "#0a2a1a" : "#2a0a0e", color: selectedTrade.isCompliant ? T.green : T.red, padding: "1px 6px", borderRadius: 3, fontSize: 9, fontWeight: 700 }}>
                    {selectedTrade.isCompliant ? "\u2713 PASS" : "\u2717 VIOLATION"}
                  </span>
                </div>
              </div>
            </div>
          )}
          <div style={{ flex: 1, overflow: "auto" }}>
            <div style={{ padding: "8px 12px 4px", fontSize: 9, color: T.textMuted, letterSpacing: 2 }}>
              TRADE LOG &mdash; {filteredTrades.length} TRADES
            </div>
            <div style={{ fontSize: 10 }}>
              <div style={{ display: "grid", gridTemplateColumns: "28px 36px 52px 48px 48px 56px 48px", gap: 2, padding: "4px 12px", borderBottom: `1px solid ${T.border}`, color: T.textMuted, fontSize: 9, letterSpacing: 0.5, position: "sticky", top: 0, background: T.bgPanel, zIndex: 1 }}>
                <span>#</span><span>SIDE</span><span>ENTRY</span><span>STOP</span><span>PNL</span><span>EXIT</span><span>REGIME</span>
              </div>
              {filteredTrades.map(t => (
                <div key={t.id} onClick={() => focusTrade(t)}
                  style={{
                    display: "grid", gridTemplateColumns: "28px 36px 52px 48px 48px 56px 48px", gap: 2,
                    padding: "5px 12px", cursor: "pointer", borderBottom: `1px solid ${T.border}08`,
                    background: selectedTrade?.id === t.id ? T.bgActive : "transparent",
                    transition: "background 0.15s",
                  }}
                  onMouseEnter={e => e.currentTarget.style.background = selectedTrade?.id === t.id ? T.bgActive : T.bgHover}
                  onMouseLeave={e => e.currentTarget.style.background = selectedTrade?.id === t.id ? T.bgActive : "transparent"}
                >
                  <span style={{ color: T.textMuted }}>{t.id}</span>
                  <span style={{ color: t.side === "long" ? T.green : T.red, fontWeight: 600 }}>{t.side === "long" ? "LNG" : "SHT"}</span>
                  <span style={{ color: T.textBright }}>{formatPrice(t.entryPrice)}</span>
                  <span style={{ color: T.textMuted }}>{t.stopDist.toFixed(0)}pt</span>
                  <span style={{ color: t.pnl >= 0 ? T.green : T.red, fontWeight: 600 }}>{t.pnl >= 0 ? "+" : ""}{t.pnl.toFixed(0)}</span>
                  <span style={{ color: exitColor(t.exitType), fontSize: 8 }}>{t.exitType.replace(/_/g, " ").split(" ").map(w => w[0].toUpperCase()).join("")}</span>
                  <span style={{ fontSize: 8 }}>
                    <span style={{ display: "inline-block", width: 5, height: 5, borderRadius: "50%", background: regimeColor(t.regime), marginRight: 3 }}></span>
                    {t.regime.replace("trending_", "T").replace("unknown", "UNK").replace("ranging", "RNG").substring(0, 3).toUpperCase()}
                  </span>
                </div>
              ))}
            </div>
          </div>
          <div style={{ padding: "8px 12px", borderTop: `1px solid ${T.border}`, fontSize: 9, color: T.textMuted }}>
            <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
              <span><span style={{ color: T.blue }}>&bull;</span> PT1</span>
              <span><span style={{ color: T.purple }}>&bull;</span> PT2</span>
              <span><span style={{ color: T.green }}>&bull;</span> Trail</span>
              <span><span style={{ color: T.red }}>&bull;</span> Stop</span>
              <span><span style={{ color: T.amber }}>&bull;</span> BE+</span>
            </div>
            <div style={{ marginTop: 4, color: T.textMuted, fontSize: 8 }}>Scroll to zoom &middot; Drag to pan &middot; Click trade to focus &middot; Drop JSON to load</div>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<NQForensicVisualizer />);
</script>
